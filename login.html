<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Magical Movie Land</title>
<style>

/* Header - Search icon අයින් කරා */
  header {
    background: #111;
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 999;
    border-bottom: 1px solid #222;
  }

  .logo{
    font-size: 22px;
    font-weight: 700;
    white-space: nowrap;
  }

  .logo span{
    color: #ff2d95;
  }

  .header-right i{
    font-size: 20px;
    cursor: pointer;
  }

  /* Sidebar + Overlay CSS */
  .sidebar {
    position: fixed;
    top: 0;
    right: -300px;
    width: 280px;
    height: 100%;
    background: #1a1a1a;
    transition: right 0.3s ease;
    z-index: 1001;
    padding-top: 60px;
  }
  .sidebar.active {
    right: 0;
  }
  .sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .sidebar ul li a {
    display: block;
    padding: 15px 20px;
    color: white;
    text-decoration: none;
    border-bottom: 1px solid #333;
  }
  .sidebar ul li.active a {
    background: #ff2d95;
    color: white;
  }
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    z-index: 1000;
  }
  .overlay.active {
    display: block;
  }
  .close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    color: white;
    cursor: pointer;
    z-index: 1002;
    line-height: 1;
  }
  .close-btn:hover {
    color: #ff2d95;
  }

  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0D0D1A; /* Screenshot වගේ Dark BG. Sudu nathi */
  }
  .box {
    background: #1A1A2E; /* Dark Box */
    border: 1px solid #FF00FF; /* Pink Border */
    padding: 25px 20px; /* Podi karala */
    border-radius: 16px;
    width: 280px; /* Podi karala */
    text-align: center;
    /* Watenama Pink Glow */
    box-shadow: 
      0 0 5px #FF00FF, 
      0 0 15px #FF00FF, 
      0 0 30px #FF00FF;
  }
  
  h2 {
    color: #FF00FF; /* Pink Text */
    margin-bottom: 20px;
    font-size: 26px;
    font-weight: 700;
    text-shadow: 0 0 15px #FF00FF; /* Text Glow */
  }
  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #FF00FF; /* Pink Border */
    border-radius: 10px;
    background: #0D0D1A; /* Dark Input */
    color: #fff;
    font-size: 15px;
    outline: none;
    box-sizing: border-box;
  }
  input:focus {
    box-shadow: 0 0 10px #FF00FF;
  }
  input::placeholder { color: #888; }
  button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #FF00FF; /* Solid Pink Button */
    color: #111;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 15px #FF00FF; /* Button Glow */
  }
  .signup-text {
    color: #ccc;
    margin-top: 15px;
    font-size: 14px;
  }
  .signup-text span {
    color: #FF00FF; /* Pink Sign Up */
    font-weight: bold;
    cursor: pointer;
    text-shadow: 0 0 8px #FF00FF;
  }
  #error { 
    color: #ff4d4d; 
    margin-top: 10px; 
    font-size: 13px; 
    background: rgba(0,0,0,0.5); 
    padding: 8px; 
    border-radius: 8px; 
  }
</style>
</head>
<body>
  
  <!-- Header -->
  <header>
    <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
      <i class="fa fa-bars" id="menuBtn"></i>
    </div>
    
    <div class="search-box" id="searchBox">
      <input type="text" id="searchInput" placeholder="Search movies & TV shows...">
      <i class="fa fa-times" id="closeSearch"></i>
    </div>
  </header>

  <div class="home-search-results" id="homeSearchResults"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <span class="close-btn" id="closeSidebar">×</span>
    <ul>
      <li><a href="login.html"><i class="fa fa-home"></i> Login</a></li>
      <li class="active"><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
      <li><a href="series.html"><i class="fa fa-tv"></i> TV Shows</a></li>
      <li><a href="request.html"><i class="fa fa-plus-circle"></i> Requests</a></li>
      <li><a href="chanels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
      <li><a href="about.html"><i class="fa fa-info-circle"></i> About</a></li>
      <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
      <li><a href="settings.html"><i class="fa fa-cog"></i> Settings</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>

 
  
  <div class="box">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <div id="error"></div>
    <div class="signup-text">Don't have an account? <span id="signupBtn">Sign Up</span></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBwlxahh7IrwSclQfl21Ybvy5eALnQM1hI",
    authDomain: "magical-pass-e8c9c.firebaseapp.com",
    projectId: "magical-pass-e8c9c",
    storageBucket: "magical-pass-e8c9c.firebasestorage.app",
    messagingSenderId: "945784290636",
    appId: "1:945784290636:web:15ace77f9b7b6a5fe0a3e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById('loginBtn').onclick = () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  signInWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = 'index.html')
    .catch(e => document.getElementById('error').innerText = e.message);
};

document.getElementById('signupBtn').onclick = () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = 'index.html')
    .catch(e => document.getElementById('error').innerText = e.message);
};
</script>
</body>
</html>
