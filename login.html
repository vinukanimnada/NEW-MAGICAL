<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Magical Movie Land</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #222 0%, #FF6B6B 100%);
  }
  .box {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 40px 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
  }
  h2 {
    color: #fff;
    margin-bottom: 25px;
    font-size: 28px;
    font-weight: 600;
  }
  input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: none;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.9);
    font-size: 15px;
    outline: none;
    box-sizing: border-box;
  }
  input::placeholder { color: #888; }
  button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #FFD166 0%, #FF8C42 100%);
    color: #111;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }
  button:hover { transform: scale(1.02); }
  .signup-text {
    color: #fff;
    margin-top: 20px;
    font-size: 14px;
  }
  .signup-text span {
    color: #FFD166;
    font-weight: bold;
    cursor: pointer;
  }
  #error { color: #ff4d4d; margin-top: 10px; font-size: 14px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; }
</style>
</head>
<body>
  <div class="box">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <div id="error"></div>
    <div class="signup-text">Don't have an account? <span id="signupBtn">Sign Up</span></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBwlxahh7IrwSclQfl21Ybvy5eALnQM1hI",
    authDomain: "magical-pass-e8c9c.firebaseapp.com",
    projectId: "magical-pass-e8c9c",
    storageBucket: "magical-pass-e8c9c.firebasestorage.app",
    messagingSenderId: "945784290636",
    appId: "1:945784290636:web:15ace77f9b7b6a5fe0a3e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById('loginBtn').onclick = () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  signInWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = 'index.html')
    .catch(e => document.getElementById('error').innerText = e.message);
};

document.getElementById('signupBtn').onclick = () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = 'index.html')
    .catch(e => document.getElementById('error').innerText = e.message);
};
</script>
</body>
</html>
