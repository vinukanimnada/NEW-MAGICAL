<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Magical Movie Land</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Arial', sans-serif; background: #0D0D1A; color: #fff; min-height: 100vh; }
  header { background: #111; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 999; border-bottom: 1px solid #222; }
 .logo { font-size: 20px; font-weight: 700; white-space: nowrap; }
 .logo span { color: #ff2d95; }
 .header-right i { font-size: 20px; cursor: pointer; margin-left: 15px; }
 .header-right i:hover { color: #ff2d95; }
 .sidebar { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: #1a1a1a; transition: right 0.3s ease; z-index: 1001; padding-top: 60px; }
 .sidebar.active { right: 0; }
 .sidebar ul { list-style: none; }
 .sidebar ul li a { display: block; padding: 15px 20px; color: white; text-decoration: none; border-bottom: 1px solid #333; }
 .sidebar ul li a i { margin-right: 10px; width: 20px; }
 .sidebar ul li.active a,.sidebar ul li a:hover { background: #ff2d95; color: white; }
 .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
 .overlay.active { display: block; }
 .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; color: white; cursor: pointer; z-index: 1002; }
 .close-btn:hover { color: #ff2d95; }
  
  main { display: flex; justify-content: center; align-items: center; padding: 40px 15px; min-height: calc(100vh - 60px); }
  
 .box { 
    background: #1A1A2E; 
    border: 1px solid #FF00FF; 
    padding: 25px 20px; 
    border-radius: 16px; 
    width: 100%; 
    max-width: 280px; 
    text-align: center; 
    box-shadow: 0 0 5px #FF00FF, 0 0 15px #FF00FF, 0 0 30px #FF00FF; 
  }
  
  h2 { 
    color: #FF00FF; 
    margin-bottom: 20px; 
    font-size: 26px; 
    font-weight: 700; 
    text-shadow: 0 0 15px #FF00FF; 
  }
  input { 
    width: 100%; 
    padding: 12px; 
    margin: 10px 0; 
    border: 1px solid #FF00FF; 
    border-radius: 10px; 
    background: #0D0D1A; 
    color: #fff; 
    font-size: 15px; 
    outline: none; 
  }
  input:focus { box-shadow: 0 0 10px #FF00FF; }
  input::placeholder { color: #888; }
  button { 
    width: 100%; 
    padding: 14px; 
    margin-top: 15px; 
    border: none; 
    border-radius: 10px; 
    background: #FF00FF; 
    color: #111; 
    font-weight: bold; 
    font-size: 16px; 
    cursor: pointer; 
    box-shadow: 0 0 15px #FF00FF; 
  }
  button:hover { filter: brightness(1.2); }
  button:disabled { background: #555; box-shadow: none; cursor: not-allowed; }
 .signup-text { color: #ccc; margin-top: 15px; font-size: 14px; }
 .signup-text a { color: #FF00FF; font-weight: bold; cursor: pointer; text-shadow: 0 0 8px #FF00FF; text-decoration: none; }
  #error { color: #ff4d4d; margin-top: 10px; font-size: 13px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; display: none; }
  #error.show { display: block; }
  #success { color: #00ff88; margin-top: 10px; font-size: 13px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; display: none; }
  #success.show { display: block; }
</style>
</head>
<body>
  
  <header>
    <div class="logo">MAGICAL <span>M🍩VIE L🌲ND</span></div>
    <div class="header-right"><i class="fa fa-bars" id="menuBtn"></i></div>
  </header>

  <div class="sidebar" id="sidebar">
    <span class="close-btn" id="closeSidebar">×</span>
    <ul>
      <li class="active"><a href="login.html"><i class="fa fa-right-to-bracket"></i> Login</a></li>
      <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
      <li><a href="series.html"><i class="fa fa-tv"></i> TV Shows</a></li>
      <li><a href="request.html"><i class="fa fa-plus-circle"></i> Requests</a></li>
      <li><a href="chanels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
      <li><a href="about.html"><i class="fa fa-info-circle"></i> About</a></li>
      <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
      <li><a href="settings.html"><i class="fa fa-cog"></i> Settings</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>

  <main>
    <div class="box">
      <h2>Login</h2>
      <input id="userOrPhone" type="text" placeholder="Username or +94 Phone" required> <!-- Email ain kala -->
      <input id="password" type="password" placeholder="Password" required>
      <button id="loginBtn">Login</button>
      <div id="error"></div>
      <div id="success"></div>
      <div class="signup-text">Don't have an account? <a href="signup.html" id="signupBtn">Sign Up</a></div>
    </div>
  </main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"; // Firestore add kala

const firebaseConfig = {
    apiKey: "AIzaSyBwlxahh7IrwSclQfl21Ybvy5eALnQM1hI",
    authDomain: "magical-pass-e8c9c.firebaseapp.com",
    projectId: "magical-pass-e8c9c",
    storageBucket: "magical-pass-e8c9c.firebasestorage.app",
    messagingSenderId: "945784290636",
    appId: "1:945784290636:web:15ace77f9b7b6a5fe0a3e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app); // DB add kala

const errorDiv = document.getElementById('error');
const successDiv = document.getElementById('success');
const loginBtn = document.getElementById('loginBtn');
const showError = (msg) => { errorDiv.innerText = msg; errorDiv.classList.add('show'); successDiv.classList.remove('show'); };
const showSuccess = (msg) => { successDiv.innerText = msg; successDiv.classList.add('show'); errorDiv.classList.remove('show'); };

document.getElementById('loginBtn').onclick = async () => {
  errorDiv.classList.remove('show');
  successDiv.classList.remove('show');
  const userInput = document.getElementById('userOrPhone').value.trim();
  const pass = document.getElementById('password').value;
  
  if(!userInput ||!pass) return showError("Username/Phone & Password දෙකම අනිවාර්යයි");
  
  loginBtn.disabled = true;
  loginBtn.innerText = "Logging in...";

  try {
    let emailToLogin = "";

    // 1. Phone ekakda balanawa +94 nisa
    if(userInput.startsWith('+94')){
        emailToLogin = userInput.replace('+','') + '@phone.user'; // Phone signup eke hadapu fake email eka
    } 
    // 2. Nattam Username ekak
    else {
        const q = query(collection(db, "users"), where("username", "==", userInput)); // Username eken hoyanawa
        const querySnapshot = await getDocs(q);
        if(querySnapshot.empty){
            throw new Error("auth/user-not-found"); // Na nam error
        }
        const userDoc = querySnapshot.docs[0].data();
        emailToLogin = userDoc.email; // Eke thiyena email eka gannawa
    }

    // 3. Hari Email eken Firebase login
    await signInWithEmailAndPassword(auth, emailToLogin, pass);
    
    // 4. Login Completed Msg eka pennawa
    showSuccess("Login Completed! ✅");

    // 5. Thathpara 1.5 kin passe Home ekata yawana
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1500);

  } catch(e) {
    if (e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found') {
        showError("Username/Phone or Password වැරදියි. ආයේ බලන්න.");
    } else {
        showError(e.message);
    }
    loginBtn.disabled = false;
    loginBtn.innerText = "Login";
  }
};

// Sidebar Toggle JS
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const closeSidebar = document.getElementById('closeSidebar');
const openSidebar = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
const closeSide = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
menuBtn.onclick = openSidebar;
closeSidebar.onclick = closeSide;
overlay.onclick = closeSide;
</script>
</body>
</html>
