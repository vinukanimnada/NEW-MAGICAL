<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Magical Movie Land</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%); /* Dark BG for Neon Pop */
  }
  .box {
    background: rgba(26, 26, 46, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid #FF00FF; /* Neon Pink Border */
    padding: 40px 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    /* Neon Glow Effect */
    box-shadow: 
      0 0 10px #FF00FF, 
      0 0 20px #FF00FF, 
      0 0 40px #FF00FF,
      inset 0 0 20px rgba(255, 0, 255, 0.1);
    animation: glow 2s ease-in-out infinite alternate;
  }
  
  @keyframes glow {
    from { box-shadow: 0 0 10px #FF00FF, 0 0 20px #FF00FF, 0 0 30px #FF00FF; }
    to { box-shadow: 0 0 20px #FF00FF, 0 0 30px #FF00FF, 0 0 50px #FF00FF; }
  }

  h2 {
    color: #FF00FF; /* Neon Pink Text */
    margin-bottom: 25px;
    font-size: 28px;
    font-weight: 600;
    text-shadow: 0 0 10px #FF00FF;
  }
  input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: 1px solid #FF00FF;
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.5);
    color: #fff;
    font-size: 15px;
    outline: none;
    box-sizing: border-box;
    transition: 0.3s;
  }
  input:focus {
    box-shadow: 0 0 10px #FF00FF;
    border: 1px solid #fff;
  }
  input::placeholder { color: #aaa; }
  button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: #FF00FF; /* Neon Pink Button */
    color: #111;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px #FF00FF;
  }
  button:hover { 
    transform: scale(1.02); 
    box-shadow: 0 0 25px #FF00FF;
  }
  .signup-text {
    color: #fff;
    margin-top: 20px;
    font-size: 14px;
  }
  .signup-text span {
    color: #FF00FF;
    font-weight: bold;
    cursor: pointer;
    text-shadow: 0 0 5px #FF00FF;
  }
  #error { color: #ff4d4d; margin-top: 10px; font-size: 14px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; }
</style>
</head>
<body>
  <div class="box">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <div id="error"></div>
    <div class="signup-text">Don't have an account? <span id="signupBtn">Sign Up</span></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBwlxahh7IrwSclQfl21Ybvy5eALnQM1hI",
    authDomain: "magical-pass-e8c9c.firebaseapp.com",
    projectId: "magical-pass-e8c9c",
    storageBucket: "magical-pass-e8c9c.firebasestorage.app",
    messagingSenderId: "945784290636",
    appId: "1:945784290636:web:15ace77f9b7b6a5fe0a3e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById('loginBtn').onclick = () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  signInWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = 'index.html')
    .catch(e => document.getElementById('error').innerText = e.message);
};

document.getElementById('signupBtn').onclick = () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = 'index.html')
    .catch(e => document.getElementById('error').innerText = e.message);
};
</script>
</body>
</html>
