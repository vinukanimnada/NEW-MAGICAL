<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Magical Movie Land</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0D0D1A; /* Screenshot වගේ Dark BG. Sudu nathi */
  }
  .box {
    background: #1A1A2E; /* Dark Box */
    border: 1px solid #FF00FF; /* Pink Border */
    padding: 25px 20px; /* Podi karala */
    border-radius: 16px;
    width: 280px; /* Podi karala */
    text-align: center;
    /* Watenama Pink Glow */
    box-shadow: 
      0 0 5px #FF00FF, 
      0 0 15px #FF00FF, 
      0 0 30px #FF00FF;
  }
  
  h2 {
    color: #FF00FF; /* Pink Text */
    margin-bottom: 20px;
    font-size: 26px;
    font-weight: 700;
    text-shadow: 0 0 15px #FF00FF; /* Text Glow */
  }
  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #FF00FF; /* Pink Border */
    border-radius: 10px;
    background: #0D0D1A; /* Dark Input */
    color: #fff;
    font-size: 15px;
    outline: none;
    box-sizing: border-box;
  }
  input:focus {
    box-shadow: 0 0 10px #FF00FF;
  }
  input::placeholder { color: #888; }
  button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #FF00FF; /* Solid Pink Button */
    color: #111;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 15px #FF00FF; /* Button Glow */
  }
  .signup-text {
    color: #ccc;
    margin-top: 15px;
    font-size: 14px;
  }
  .signup-text span {
    color: #FF00FF; /* Pink Sign Up */
    font-weight: bold;
    cursor: pointer;
    text-shadow: 0 0 8px #FF00FF;
  }
  #error { 
    color: #ff4d4d; 
    margin-top: 10px; 
    font-size: 13px; 
    background: rgba(0,0,0,0.5); 
    padding: 8px; 
    border-radius: 8px; 
  }
</style>
</head>
<body>
  <div class="box">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <div id="error"></div>
    <div class="signup-text">Don't have an account? <span id="signupBtn">Sign Up</span></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBwlxahh7IrwSclQfl21Ybvy5eALnQM1hI",
    authDomain: "magical-pass-e8c9c.firebaseapp.com",
    projectId: "magical-pass-e8c9c",
    storageBucket: "magical-pass-e8c9c.firebasestorage.app",
    messagingSenderId: "945784290636",
    appId: "1:945784290636:web:15ace77f9b7b6a5fe0a3e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById('loginBtn').onclick = () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  signInWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = 'index.html')
    .catch(e => document.getElementById('error').innerText = e.message);
};

document.getElementById('signupBtn').onclick = () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = 'index.html')
    .catch(e => document.getElementById('error').innerText = e.message);
};
</script>
</body>
</html>
