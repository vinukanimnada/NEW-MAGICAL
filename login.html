<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Magical Movie Land</title>
<style>
  body { font-family: Arial; background: #111; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .box { background: #222; padding: 30px; border-radius: 10px; width: 320px; text-align: center; }
  input { width: 90%; padding: 10px; margin: 8px 0; border: none; border-radius: 5px; }
  button { width: 95%; padding: 10px; margin-top: 10px; border: none; border-radius: 5px; background: #e50914; color: #fff; font-weight: bold; cursor: pointer; }
  button:hover { background: #f40612; }
  #error { color: #ff4d4d; margin-top: 10px; font-size: 14px; }
</style>
</head>
<body>
  <div class="box">
    <h2>Login / Sign Up</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <button id="signupBtn">Account එකක් නෑ? Sign Up</button>
    <div id="error"></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 1. මේක උඹේ Config එක. Change කරන්න එපා
const firebaseConfig = {
    apiKey: "AIzaSyBwlxahh7IrwSclQfl21Ybvy5eALnQM1hI",
    authDomain: "magical-pass-e8c9c.firebaseapp.com",
    projectId: "magical-pass-e8c9c",
    storageBucket: "magical-pass-e8c9c.firebasestorage.app",
    messagingSenderId: "945784290636",
    appId: "1:945784290636:web:15ace77f9b7b6a5fe0a3e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById('loginBtn').onclick = () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  signInWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = 'index.html')
    .catch(e => document.getElementById('error').innerText = e.message);
};

document.getElementById('signupBtn').onclick = () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = 'index.html')
    .catch(e => document.getElementById('error').innerText = e.message);
};
</script>
</body>
</html>
