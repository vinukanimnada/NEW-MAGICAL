<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Magical Movie Land</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Arial', sans-serif; background: #0D0D1A; color: #fff; min-height: 100vh; }
  header { background: #111; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 999; }
  .logo { font-size: 20px; font-weight: 700; }
  .logo span { color: #ff2d95; }
  .header-right i { font-size: 20px; cursor: pointer; }
  .sidebar { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: #1a1a1a; transition: right 0.3s ease; z-index: 1001; padding-top: 60px; }
  .sidebar.active { right: 0; }
  .sidebar ul { list-style: none; }
  .sidebar ul li a { display: block; padding: 15px 20px; color: white; text-decoration: none; border-bottom: 1px solid #333; }
  .sidebar ul li.active a, .sidebar ul li a:hover { background: #ff2d95; }
  .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
  .overlay.active { display: block; }
  .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; color: white; cursor: pointer; }
  main { display: flex; justify-content: center; align-items: center; padding: 40px 15px; min-height: calc(100vh - 60px); }
  .box { background: #1A1A2E; border: 2px solid #FF00FF; padding: 25px 20px; border-radius: 16px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 0 15px #FF00FF; }
  h2 { color: #FF00FF; margin-bottom: 20px; font-size: 26px; text-shadow: 0 0 15px #FF00FF; }
  input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #FF00FF; border-radius: 10px; background: #0D0D1A; color: #fff; font-size: 15px; outline: none; }
  input:focus { box-shadow: 0 0 10px #FF00FF; }
  input.valid { border-color: #00ff88; box-shadow: 0 0 10px #00ff88; } 
  input.invalid { border-color: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; } 
  input:disabled { background: #222; opacity: 0.6; }
  
  .otp-row { display: flex; gap: 10px; align-items: center; margin: 8px 0; }
  .otp-row input { margin: 0; flex: 1; }
  .otp-row button { width: auto; margin: 0; padding: 12px 16px; white-space: nowrap; }

  button { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 10px; background: #FF00FF; color: #111; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
  button:disabled { background: #555; color: #888; cursor: not-allowed; }
  #recaptcha-container { margin: 10px auto; display: flex; justify-content: center; } /* Center karala */
  .login-text { color: #ccc; margin-top: 15px; font-size: 14px; }
  .login-text a { color: #FF00FF; font-weight: bold; text-decoration: none; }
  #error { color: #ff4d4d; margin-top: 10px; font-size: 13px; display: none; }
  #error.show { display: block; }
  #success { color: #00ff88; margin-top: 10px; font-size: 13px; display: none; }
  #success.show { display: block; }
</style>
</head>
<body>
  
  <header>
    <div class="logo">MAGICAL <span>M🍩VIE L🌲ND</span></div>
    <div class="header-right"><i class="fa fa-bars" id="menuBtn"></i></div>
  </header>

  <div class="sidebar" id="sidebar">
    <span class="close-btn" id="closeSidebar">×</span>
    <ul>
      <li><a href="login.html"><i class="fa fa-right-to-bracket"></i> Login</a></li>
      <li class="active"><a href="signup.html"><i class="fa fa-user-plus"></i> Sign Up</a></li>
      <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>

  <main>
    <div class="box">
      <h2>Sign Up</h2>
      <input id="fname" type="text" placeholder="First Name" required>
      <input id="lname" type="text" placeholder="Last Name" required>
      <input id="username" type="text" placeholder="Username" required> 
      
      <div class="otp-row">
        <input id="phone" type="tel" placeholder="+94723988540" required> 
        <button id="sendOtpBtn" type="button">Send OTP</button>
      </div>

      <div id="otpVerifySection">
        <input id="otpInput" type="text" placeholder="Verification code" inputmode="numeric" maxlength="6">
        <button id="verifyOtpBtn" type="button">Verify OTP</button>
      </div>

      <input id="password" type="password" placeholder="Password - 6+ letters" required>
      
      <div id="recaptcha-container"></div> <!-- Me box eka penawa dan -->

      <button id="signupBtn" disabled>Create Account</button>
      <div id="error"></div>
      <div id="success"></div>
      <div class="login-text">Already have an account? <a href="login.html">Login</a></div>
    </div>
  </main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"; 

const firebaseConfig = {
    apiKey: "AIzaSyBwlxahh7IrwSclQfl21Ybvy5eALnQM1hI",
    authDomain: "magical-pass-e8c9c.firebaseapp.com",
    projectId: "magical-pass-e8c9c",
    storageBucket: "magical-pass-e8c9c.firebasestorage.app",
    messagingSenderId: "945784290636",
    appId: "1:945784290636:web:15ace77f9b7b6a5fe0a3e9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app); 

const errorDiv = document.getElementById('error');
const successDiv = document.getElementById('success');
const phoneInput = document.getElementById('phone');
const otpInput = document.getElementById('otpInput');
const sendOtpBtn = document.getElementById('sendOtpBtn');
const signupBtn = document.getElementById('signupBtn');
let confirmationResult; 
let isPhoneVerified = false;
let otpTimer;
let recaptchaWidgetId; // Widget ID save karanna

const showError = (msg) => { errorDiv.innerText = msg; errorDiv.classList.add('show'); successDiv.classList.remove('show'); };
const showSuccess = (msg) => { successDiv.innerText = msg; successDiv.classList.add('show'); errorDiv.classList.remove('show'); };

// 1. reCAPTCHA NORMAL Setup - Fix eka meke. GitHub Pages walata meka witharai wada.
window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 
  'size': 'normal',
  'callback': (response) => {
    // reCAPTCHA ok una gaman
  },
  'expired-callback': () => {
    // Expire una gaman aye render karanna
    grecaptcha.reset(recaptchaWidgetId);
  }
});

// 30s Timer Function
function startOtpTimer() {
  let t = 30;
  sendOtpBtn.disabled = true;
  sendOtpBtn.textContent = t + 's';
  otpTimer = setInterval(() => {
    t--;
    sendOtpBtn.textContent = t + 's';
    if(t <= 0){
      clearInterval(otpTimer);
      sendOtpBtn.disabled = false;
      sendOtpBtn.textContent = 'Resend OTP';
    }
  }, 1000);
}

// 2. Send OTP Click
sendOtpBtn.onclick = async () => {
  const phoneNumber = phoneInput.value.trim();
  if(!phoneNumber.startsWith('+94')) return showError("+94 walin patawanna. Ex: +9477...");

  sendOtpBtn.disabled = true;
  try {
    confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
    showSuccess("OTP eka SMS karala thiyenawa. Code eka danna.");
    phoneInput.classList.remove('invalid');
    phoneInput.classList.add('valid');
    startOtpTimer();
  } catch(e) {
    console.error(e);
    showError("Error: " + e.code + " - " + e.message); // Code ekath pennam
    phoneInput.classList.add('invalid');
    sendOtpBtn.disabled = false;
    grecaptcha.reset(recaptchaWidgetId); // Fail una gaman aye captcha
  }
};

// 3. Verify OTP Click
document.getElementById('verifyOtpBtn').onclick = async () => {
  if(!confirmationResult) return showError("Pehala Send OTP click karapan");
  
  const code = otpInput.value.trim();
  if(code.length !== 6) return showError("6 digit code eka damma");
  
  try {
    await confirmationResult.confirm(code);
    showSuccess("Phone Number Verified ✅");
    otpInput.classList.add('valid'); 
    otpInput.disabled = true;
    document.getElementById('verifyOtpBtn').disabled = true;
    isPhoneVerified = true;
    signupBtn.disabled = false; 
    clearInterval(otpTimer);
    sendOtpBtn.textContent = 'Verified';
    sendOtpBtn.disabled = true;
  } catch(e) {
    showError("OTP Code eka waradi ❌: " + e.message);
    otpInput.classList.add('invalid'); 
    isPhoneVerified = false;
  }
};

// 4. Final Create Account
signupBtn.onclick = async () => {
  if(!isPhoneVerified) return showError("Pehala Phone eka Verify karapan. Green border eka balapan.");

  const fname = document.getElementById('fname').value.trim();
  const lname = document.getElementById('lname').value.trim();
  const username = document.getElementById('username').value.trim();
  const phone = phoneInput.value.trim();
  const pass = document.getElementById('password').value;
  
  if(!fname || !lname || !username || !pass) return showError("Hama field ekakma fill karapan");
  if(pass.length < 6) return showError("Password 6+ letters wenna ona");

  signupBtn.disabled = true;
  signupBtn.innerText = "Creating...";

  try {
    const fakeEmail = phone.replace('+','') + '@phone.user'; 
    const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
    const user = userCredential.user;
    
    await updateProfile(user, { displayName: `${fname} ${lname}` });
    await setDoc(doc(db, "users", user.uid), { 
      uid: user.uid, firstName: fname, lastName: lname, username: username, 
      phone: phone, email: fakeEmail, createdAt: new Date() 
    });

    showSuccess("Account හරි! Login වෙන්න.");
    setTimeout(() => { window.location.href = 'login.html'; }, 1500);

  } catch(e) {
    showError(e.code + ": " + e.message); // Error code ekath pennam
    signupBtn.disabled = false;
    signupBtn.innerText = "Create Account";
  }
};

// Sidebar Toggle
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const closeSidebar = document.getElementById('closeSidebar');
menuBtn.onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
closeSidebar.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
</script>
</body>
</html>
