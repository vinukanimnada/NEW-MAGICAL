<!DOCTYPE html>
<html lang="si" class="dark"> <!-- 1. class="dark" add kala -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Shows - MAGICAL MOVIE LAND</title>
  <link rel="stylesheet" href="style.css?v=19">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
 
  <link rel="icon" href="https://files.catbox.moe/nstkne.png" type="image/png">
  <link rel="apple-touch-icon" href="https://files.catbox.moe/nstkne.png">
  
   <style>
    * { box-sizing: border-box; }
  /* body{} ain kala. style.css eken wada */

  .container { padding: 15px; } /* Content eka wrap karanna */

  h1 {
    font-size: 20px;
    margin: 15px 0;
    padding-left: 12px;
    border-left: 4px solid #ff2d95;
    color: var(--text); /* theme color */
  }
  
  /* Cinesubz style grid — padding eka methanata direct dama (movies.html
     eke widiyatama), container eke padding eka double-apply wenna epa nisa
     kalin card size eka poddak wenas una. Dan movies.html ekema padding
     values (10px mobile / 20px desktop) use karanawa — card size eka
     hariyatama match wenawa. */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 10px;
    background: transparent; /* #000 ain */
  }
  
  @media(min-width: 768px) { /* mobile first > desktop */
    .movie-grid { grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 20px; }
  }
  
  /* Card style — movies.html eke card style ekama hariyata match kala
     (kalinma thibba season-badge/movie-info-bottom wrapper eka ain kara,
     dan quality-badge + rating-badge + gradient title ekama design eka) */
  .movie-card {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    background: var(--card);
    cursor: pointer;
    transition: transform 0.2s;
    aspect-ratio: 2/3;
  }
  .movie-card:hover { transform: scale(1.05); }
  
  .movie-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: var(--card-2);
  }
  
  /* Top Left - RED Badge (season/quality info) */
  .quality-badge {
    position: absolute;
    top: 5px;
    left: 5px;
    background: #e50914;
    padding: 2px 5px;
    font-size: 10px;
    font-weight: 700;
    border-radius: 3px;
    color: white;
    z-index: 3;
    text-transform: uppercase;
    line-height: 1;
  }
  
  /* Top Right - ★ Rating YELLOW Badge */
  .rating-badge {
    position: absolute;
    top: 5px;
    right: 5px;
    background: #ffc107;
    color: #000;
    padding: 2px 5px;
    font-size: 10px;
    font-weight: 700;
    border-radius: 3px;
    z-index: 3;
    line-height: 1;
  }
  
  /* Bottom Title - Left align + Gradient */
  .movie-title {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 6px 6px;
    font-size: 12px;
    text-align: left;
    font-weight: 500;
    color: #fff;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 50%, transparent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    z-index: 2;
    line-height: 1.2;
  }
  
  .home-no-result { text-align:center; color:var(--text-faint); padding:50px 0; grid-column: 1/-1; }

  /* ===== Search Results List View (methanata mulinma add kala —
     kalinma search input/button eka thibbath, results container ekakwath
     JS wiring ekakwath thibbe na, e nisa search eka wada kale na) ===== */
  .search-results { display: none; padding: 10px; }
  .search-results.active { display: block; }
  .search-result-item {
    display: flex; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s;
  }
  .search-result-item:hover { background: var(--card); }
  .search-result-poster { width: 60px; height: 90px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
  .search-result-info { flex: 1; overflow: hidden; }
  .search-result-title {
    font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .search-result-meta { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .search-no-result { text-align: center; color: var(--text-faint); padding: 50px 20px; font-size: 14px; }
  </style>
</head>
<body>
  
  <header id="mainHeader">
    <div class="header-left">
      <button class="menu-toggle" id="menuBtn" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
    </div>
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
    </div>

    <div class="search-box" id="searchBox">
      <input type="text" id="searchInput" placeholder="Search TV Shows...">
      <i class="fa fa-times" id="closeSearch"></i>
    </div>
  </header>

  <div class="sidebar" id="sidebar">
    <ul>
      <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
      <li class="active"><a href="lkcinema.html"><i class="fa-solid fa-clapperboard"></i> LK Cinema</a></li>
      <li><a href="series.html"><i class="fa fa-tv"></i> TV Shows</a></li>
      <li><a href="request.html"><i class="fa fa-plus-circle"></i> Requests</a></li>
      <li><a href="chanels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
      <li><a href="about.html"><i class="fa fa-info-circle"></i> About</a></li>
      <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
      <li><a href="settings.html"><i class="fa fa-cog"></i> Settings</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>

  <div class="container">
    <h1>TV Shows</h1>
  </div>
  <div class="movie-grid" id="tvShowsGrid">
    <div class="home-no-result">Loading...</div>
  </div>


  <!-- Search Results List (aluthin add kala) -->
  <div class="search-results" id="searchResults"></div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
    authDomain: "magical-movie-land.firebaseapp.com",
    projectId: "magical-movie-land",
    storageBucket: "magical-movie-land.firebasestorage.app",
    messagingSenderId: "27757424288",
    appId: "1:27757424288:web:d650e2659f09f0b9c823c5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // searchIndex — Firestore eke thiyena OKKOMA movies (section ekakata
  // witharak tag karapu ewath ethulath), title eken dedupe karala. Search
  // ekata witharak use karanawa — grid eke pennana "TV Shows" filter ekata
  // wenama widiyakata.
  let searchIndex = [];

  function dedupeByTitle(list) {
    const seen = new Set();
    const out = [];
    (list || []).forEach(m => {
      const key = (m.title || '').trim().toLowerCase();
      if (!key || seen.has(key)) return;
      seen.add(key);
      out.push(m);
    });
    return out;
  }

  async function loadTVShows() {
    const grid = document.getElementById('tvShowsGrid');
    
    try {
      // Vinuka ge ඉල්ලීම: aluthinma save karapu movie eka LIST EKE
      // ANTHIMATA yanna one (kalin "desc" nisa aluth ekama palaweniyata
      // enawa) — ea nisa "asc" (oldest -> newest) widiyata badalu.
      const q = query(collection(db, "movies"), orderBy("date", "asc"));
      const snapshot = await getDocs(q);
      
      if(snapshot.empty) {
        grid.innerHTML = '<div class="home-no-result">TV Shows නැත</div>';
        return;
      }

      // Search index eka methanin hadanawa — snapshot eka okkoma dees ekama
      // documents tika, section filter ekakwath nathuwa.
      const allDocs = [];
      snapshot.forEach(d => { const m = d.data(); m.id = d.id; if (m.title) allDocs.push(m); });
      searchIndex = dedupeByTitle(allDocs);
      
      let html = '';
      snapshot.forEach(doc => {
        const m = doc.data();
        
        // FIX: admin panel eke "Show In Sections" list eke "TV Shows Page" (value="series")
        // select kala documents witharak methanata ganna. m.type === 'series' fallback
        // widiyata thiyenne pරanha (sections nathi) purana entries walata.
        const sections = Array.isArray(m.sections) ? m.sections : [];
        if(!sections.includes('series') && m.type !== 'series') return;
        
        const poster = m.poster || 'https://via.placeholder.com/300x450/222/fff?text=No+Image';
        const title = m.title || 'Untitled';
        const year = m.year || '';
        const season = m.season || ''; // S01 EP05
        let rating = m.rating? m.rating.toString().split('/')[0] : '';
        if (rating && !rating.includes('.')) rating += '.0';
        
        let displayTitle = title;
        if(year) displayTitle += ` (${year})`;
        if (displayTitle.length > 20) displayTitle = displayTitle.substring(0, 20) + '...';
        
        // movies.html eke card style ekama — quality-badge (top-left) +
        // rating-badge (top-right) + gradient title. Season text eka
        // tibboth quality-badge ekema pennanawa (kalin tibba green/red
        // season-badge design eka ain kara, ekama pink/red badge style eka).
        html += `
          <div class="movie-card" onclick="window.location.href='watch.html?id=${doc.id}'">
            ${season ? `<span class="quality-badge">${season}</span>` : ''}
            ${rating ? `<span class="rating-badge">★ ${rating}</span>` : ''}
            <img src="${poster}" alt="${title}" loading="eager" decoding="async"
                 onerror="this.onerror=null; this.src='https://via.placeholder.com/300x450/222/fff?text=No+Image';">
            <div class="movie-title">${displayTitle}</div>
          </div>
        `;
      });
      
      grid.innerHTML = html || '<div class="home-no-result">TV Shows නැත</div>';
      
    } catch(err) {
      console.error("❌ Error:", err);
      grid.innerHTML = '<p style="color:red;text-align:center;">Error: ' + err.message + '</p>';
    }
  }
  
  loadTVShows();

  /* =========================================================
     SEARCH — aluthin add kala. Kalin search input/button eka
     header eke thibbath, mekata kisima JS wiring ekak thibbe na
     (results container ekakwath thibbe na), e nisa search eka
     kisisema wada kale na. Dan searchIndex (okkoma movies) eken
     search karanawa.
     ========================================================= */
  function searchTVShows(qText) {
    const resultsDiv = document.getElementById('searchResults');
    const gridDiv = document.getElementById('tvShowsGrid');
    if (!resultsDiv || !gridDiv) return;

    if (!qText.trim()) {
      resultsDiv.classList.remove('active');
      gridDiv.style.display = 'grid';
      return;
    }

    gridDiv.style.display = 'none';
    resultsDiv.classList.add('active');

    const filtered = searchIndex.filter(m =>
      m.title && m.title.toLowerCase().includes(qText.toLowerCase())
    );

    if (filtered.length === 0) {
      resultsDiv.innerHTML = '<div class="search-no-result">🔍 Not Found</div>';
      return;
    }

    resultsDiv.innerHTML = filtered.map(m => {
      const poster = m.poster || 'https://via.placeholder.com/60x90/222/fff';
      const year = m.year || 'N/A';
      const duration = m.duration || '';
      const genre = m.genre || 'TV Show';
      let title = m.title;
      if (title.length > 40) title = title.substring(0, 40) + '...';

      return `
        <div class="search-result-item" onclick="window.location.href='watch.html?id=${m.id}'">
          <img src="${poster}" class="search-result-poster" loading="lazy">
          <div class="search-result-info">
            <div class="search-result-title">${title}</div>
            <div class="search-result-meta">
              ${year}${duration ? ' • ' + duration : ''}<br>
              ${genre}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', () => {
    const searchBtn = document.getElementById('searchBtn');
    const closeSearch = document.getElementById('closeSearch');
    searchBtn?.addEventListener('click', () => {
      if (!document.getElementById('searchBox')?.classList.contains('active')) searchTVShows('');
    });
    closeSearch?.addEventListener('click', () => searchTVShows(''));
  });

  let searchTimeout;
  document.getElementById('searchInput')?.addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => searchTVShows(e.target.value), 300);
  });
  document.getElementById('searchInput')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') searchTVShows(e.target.value);
  });
  </script>

  <script src="script.js"></script> <!-- sidebar/menu/search okkoma meken -->

</body></html>
