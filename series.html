<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Shows - MAGICAL MOVIE LAND</title>
  <link rel="stylesheet" href="style.css?v=19">
  <style>
  body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
  }
  
  h1 {
    font-size: 20px;
    margin-bottom: 15px;
    padding-left: 12px;
    border-left: 4px solid #ff2d95;
  }
  
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  
  @media(max-width: 768px) {
    .movie-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
  }
  
  .movie-card {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    background: #111;
    cursor: pointer;
  }
  
  .movie-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }
  
  .season-badge {
    position: absolute;
    top: 6px;
    left: 6px;
    background: #ff2d95;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 6px;
    border-radius: 4px;
    z-index: 2;
    white-space: nowrap;
  }
  .season-badge.green {
    background: #22c55e;
  }
  
  .rating-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: #fbbf24;
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 6px;
    border-radius: 4px;
    z-index: 2;
  }
  
  .movie-title {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
    padding: 25px 6px 6px 6px;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .play-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 40px;
    background: rgba(0,0,0,0.7);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #fff;
  }
  </style>
</head>
<body>
  
  <header>
    <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
      <i class="fa fa-bars" id="menuBtn"></i>
    </div>
    
    <!-- Search Bar - ID දැම්මා -->
    <div class="search-box" id="searchBox">
      <input type="text" id="searchInput" placeholder="Search movies & TV shows...">
      <i class="fa fa-times" id="closeSearch"></i>
    </div>
  </header>

  <!-- Home Search Results Dropdown -->
  <div class="home-search-results" id="homeSearchResults"></div>

  <!-- Sidebar Menu -->
  <div class="sidebar" id="sidebar">
    <span class="close-btn" id="closeSidebar">×</span>
    <ul>
      <li class="active"><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
      <li><a href="series.html"><i class="fa fa-tv"></i> TV Shows</a></li>
      <li><a href="chanels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
      <li><a href="about.html"><i class="fa fa-info-circle"></i> About</a></li>
      <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>
  
  <h1>TV Shows</h1>
  <div class="movie-grid" id="tvShowsGrid"></div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
    authDomain: "magical-movie-land.firebaseapp.com",
    projectId: "magical-movie-land",
    storageBucket: "magical-movie-land.firebasestorage.app",
    messagingSenderId: "27757424288",
    appId: "1:27757424288:web:d650e2659f09f0b9c823c5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadTVShows() {
    const grid = document.getElementById('tvShowsGrid');
    
    try {
      // FIX: where("in") අයින් කරලා timestamp විතරක් order කළා
      const q = query(
        collection(db, "movies"), 
        orderBy("createdAt", "desc")  // createdAt use කරපන්, timestamp නෙවෙයි
      );
      const snapshot = await getDocs(q);
      
      if(snapshot.empty) {
        grid.innerHTML = '<p style="text-align:center;color:#666;">TV Shows නැත</p>';
        return;
      }
      
      grid.innerHTML = '';
      snapshot.forEach(doc => {
        const m = doc.data();
        
        // FIX: Client side filter - tvshows or alltvshows විතරක් ගන්නවා
        if(m.category !== 'tvshows' && m.category !== 'alltvshows') return;
        
        const poster = m.poster || 'https://via.placeholder.com/300x400/222/fff';
        const title = m.title || 'No Title';
        const year = m.year || '';
        const season = m.season || '';
        const rating = m.rating || '';
        
        let displayTitle = title;
        if(year) displayTitle += ` (${year})`;
        if(displayTitle.length > 25) displayTitle = displayTitle.substring(0, 25) + '...';
        
        let badgeClass = '';
        if(season && season.includes('EP')) badgeClass = 'green';
        
        grid.innerHTML += `
          <div class="movie-card" onclick="window.location.href='watch.html?id=${doc.id}'">
            <img src="${poster}" loading="lazy">
            
            ${season ? `<div class="season-badge ${badgeClass}">${season}</div>` : ''}
            ${rating ? `<div class="rating-badge">★ ${rating}</div>` : ''}
            
            <div class="movie-title">${displayTitle}</div>
            
            <div class="play-overlay">▶</div>
          </div>
        `;
      });
      
    } catch(err) {
      console.error("❌ Error:", err);
      grid.innerHTML = '<p style="color:red;">Error: ' + err.message + '</p>';
    }
  }
  
  loadTVShows();
  </script>
</body>
