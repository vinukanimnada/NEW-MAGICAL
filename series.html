<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Shows - MAGICAL MOVIE LAND</title>
  <link rel="stylesheet" href="style.css?v=19">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  * { box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  .container { padding: 15px; } /* Content eka wrap karanna */

  h1 {
    font-size: 20px;
    margin: 15px 0;
    padding-left: 12px;
    border-left: 4px solid #ff2d95;
  }
  
  /* Cinesubz style grid */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  
  @media(max-width: 768px) {
    .movie-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  }
  
  /* Card style - Cinesubz වගේ */
  .movie-card {
    position: relative;
    aspect-ratio: 2/3;
    border-radius: 6px;
    overflow: hidden;
    background: #111;
    cursor: pointer;
  }
  
  .movie-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  
  /* Season badge - කොළ/රතු (UNCHANGED) */
  .season-badge {
    position: absolute;
    top: 6px;
    left: 6px;
    background: #22c55e; /* කොළ - ongoing */
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 5px;
    border-radius: 4px;
    z-index: 2;
    white-space: nowrap;
    max-width: 65%;
    text-overflow: ellipsis;
    overflow: hidden;
  }
  
  .season-badge.complete { background: #dc2626; /* රතු - complete */ }
  
  /* Rating badge - කහ (UNCHANGED) */
  .rating-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: #fbbf24;
    color: #000;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 5px;
    border-radius: 4px;
    z-index: 2;
  }
  
  /* Bottom title - gradient */
  .movie-info-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 35px 6px 6px 6px;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
    z-index: 2;
  }
  
  .movie-title {
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  
  .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 35px;
    color: #333;
    background: #1a1a1a;
  }
  
  .home-no-result { text-align:center; color:#666; padding:50px 0; }
  </style>
</head>
<body>
  
  <header id="mainHeader">
    <div class="header-left">
      <button class="menu-toggle" id="menuBtn" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
    </div>
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
    </div>

    <div class="search-box" id="searchBox">
      <input type="text" id="searchInput" placeholder="Search TV Shows...">
      <i class="fa fa-times" id="closeSearch"></i>
    </div>
  </header>

  <div class="sidebar" id="sidebar">
    <ul>
      <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
      <li class="active"><a href="series.html"><i class="fa fa-tv"></i> TV Shows</a></li>
      <li><a href="request.html"><i class="fa fa-plus-circle"></i> Requests</a></li>
      <li><a href="chanels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
      <li><a href="about.html"><i class="fa fa-info-circle"></i> About</a></li>
      <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
      <li><a href="settings.html"><i class="fa fa-cog"></i> Settings</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>

  <div class="container">
    <h1>TV Shows</h1>
    <div class="movie-grid" id="tvShowsGrid">
      <div class="home-no-result">Loading...</div>
    </div>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
    authDomain: "magical-movie-land.firebaseapp.com",
    projectId: "magical-movie-land",
    storageBucket: "magical-movie-land.firebasestorage.app",
    messagingSenderId: "27757424288",
    appId: "1:27757424288:web:d650e2659f09f0b9c823c5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadTVShows() {
    const grid = document.getElementById('tvShowsGrid');
    
    try {
      const q = query(collection(db, "movies"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      
      if(snapshot.empty) {
        grid.innerHTML = '<div class="home-no-result">TV Shows නැත</div>';
        return;
      }
      
      let html = '';
      snapshot.forEach(doc => {
        const m = doc.data();
        
        // tvshows or alltvshows විතරක්
        if(m.category !== 'tvshows' && m.category !== 'alltvshows' && m.type !== 'series') return;
        
        const poster = m.poster || '';
        const title = m.title || 'Untitled';
        const year = m.year || '';
        const season = m.season || ''; // S01 EP05
        const rating = m.rating || '0.0';
        
        let displayTitle = title;
        if(year) displayTitle += ` (${year})`;
        
        let badgeClass = '';
        if(season && season.toUpperCase().includes('COMPLETE')) {
          badgeClass = 'complete';
        }
        
        html += `
          <div class="movie-card" onclick="window.location.href='watch.html?id=${doc.id}'">
            ${season ? `<div class="season-badge ${badgeClass}">${season}</div>` : ''}
            <div class="rating-badge">★ ${rating}</div>
            ${poster ? 
              `<img src="${poster}" loading="lazy" onerror="this.outerHTML='<div class=img-placeholder>?</div>'">` 
              : `<div class="img-placeholder">?</div>`
            }
            <div class="movie-info-bottom">
              <p class="movie-title">${displayTitle}</p>
            </div>
          </div>
        `;
      });
      
      grid.innerHTML = html || '<div class="home-no-result">TV Shows නැත</div>';
      
    } catch(err) {
      console.error("❌ Error:", err);
      grid.innerHTML = '<p style="color:red;text-align:center;">Error: ' + err.message + '</p>';
    }
  }
  
  loadTVShows();

  /* =========================================================
     Keep --header-h in sync with the header's real height
     ========================================================= */
  const mainHeaderEl = document.getElementById('mainHeader');
  function syncHeaderHeight() {
    if (!mainHeaderEl) return;
    document.documentElement.style.setProperty('--header-h', mainHeaderEl.offsetHeight + 'px');
  }
  window.addEventListener('resize', syncHeaderHeight);
  window.addEventListener('load', syncHeaderHeight);
  syncHeaderHeight();
  if (window.ResizeObserver) new ResizeObserver(syncHeaderHeight).observe(mainHeaderEl);

  // Menu + Search JS - same behaviour as index.html
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const searchBtn = document.getElementById('searchBtn');
  const searchBox = document.getElementById('searchBox');
  const closeSearch = document.getElementById('closeSearch');
  const searchInput = document.getElementById('searchInput');

  function openSidebar() {
    sidebar.classList.add('active');
    overlay.classList.add('active');
    menuBtn.classList.add('active');
  }
  function closeSidebarFn() {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
    menuBtn.classList.remove('active');
  }
  menuBtn.onclick = () => { sidebar.classList.contains('active') ? closeSidebarFn() : openSidebar(); };
  overlay.onclick = closeSidebarFn;
  searchBtn.onclick = () => { searchBox.classList.toggle('active'); if(searchBox.classList.contains('active')) searchInput.focus(); };
  closeSearch.onclick = () => { searchBox.classList.remove('active'); };
  </script>

</body></html>
