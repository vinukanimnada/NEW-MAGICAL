<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Shows - MAGICAL MOVIE LAND</title>
  <link rel="stylesheet" href="style.css?v=19">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
  }
  
  h1 {
    font-size: 20px;
    margin-bottom: 15px;
    padding-left: 12px;
    border-left: 4px solid #ff2d95;
  }
  
  /* UPDATED: Admin panel style grid */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0;
  }
  
  @media(max-width: 768px) {
    .movie-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
  }
  
  /* UPDATED: Card style - admin panel එක වගේ */
  .movie-card {
    position: relative;
    aspect-ratio: 2/3; /* 2:3 ratio - admin එක වගේ */
    border-radius: 8px;
    overflow: hidden;
    background: #1a1a1a;
    cursor: pointer;
    transition: transform 0.2s;
  }
  
  .movie-card:active {
    transform: scale(0.97);
  }
  
  .movie-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  
  /* UPDATED: FHD badge - රතු */
  .badge-quality {
    position: absolute;
    top: 5px;
    left: 5px;
    background: #ff0000;
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 6px;
    border-radius: 4px;
    z-index: 2;
  }
  
  /* UPDATED: Rating badge - කහ */
  .badge-rating {
    position: absolute;
    top: 5px;
    right: 5px;
    background: #ffcc00;
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 6px;
    border-radius: 4px;
    z-index: 2;
  }
  
  /* Season badge - TV Shows වලට */
  .season-badge {
    position: absolute;
    top: 5px;
    left: 5px;
    background: #ff2d95;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 6px;
    border-radius: 4px;
    z-index: 2;
    white-space: nowrap;
    max-width: 70%;
  }
  .season-badge.green {
    background: #22c55e;
  }
  
  /* Quality badge එකත් එක්ක season එක overlap වෙන්නේ නෑ */
  .has-quality .season-badge {
    top: 25px;
  }
  
  /* UPDATED: Bottom gradient + title */
  .movie-info-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 30px 6px 6px 6px;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
    z-index: 2;
  }
  
  .movie-title {
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .play-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 40px;
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #fff;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 3;
  }
  
  .movie-card:active .play-overlay {
    opacity: 1;
  }
  
  /* Image load වෙනකන් placeholder */
  .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: #333;
    background: #1a1a1a;
  }
  </style>
</head>
<body>
  
  <header>
    <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
      <i class="fa fa-bars" id="menuBtn"></i>
    </div>
    
    <div class="search-box" id="searchBox">
      <input type="text" id="searchInput" placeholder="Search movies & TV shows...">
      <i class="fa fa-times" id="closeSearch"></i>
    </div>
  </header>

  <div class="home-search-results" id="homeSearchResults"></div>

  <div class="sidebar" id="sidebar">
    <span class="close-btn" id="closeSidebar">×</span>
    <ul>
      <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
      <li class="active"><a href="series.html"><i class="fa fa-tv"></i> TV Shows</a></li>
      <li><a href="chanels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
      <li><a href="about.html"><i class="fa fa-info-circle"></i> About</a></li>
      <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>
  
  <h1>TV Shows</h1>
  <div class="movie-grid" id="tvShowsGrid"></div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
    authDomain: "magical-movie-land.firebaseapp.com",
    projectId: "magical-movie-land",
    storageBucket: "magical-movie-land.firebasestorage.app",
    messagingSenderId: "27757424288",
    appId: "1:27757424288:web:d650e2659f09f0b9c823c5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadTVShows() {
    const grid = document.getElementById('tvShowsGrid');
    
    try {
      const q = query(collection(db, "movies"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      
      if(snapshot.empty) {
        grid.innerHTML = '<p style="text-align:center;color:#666;">TV Shows නැත</p>';
        return;
      }
      
      let html = '';
      snapshot.forEach(doc => {
        const m = doc.data();
        
        // tvshows or alltvshows විතරක්
        if(m.category !== 'tvshows' && m.category !== 'alltvshows') return;
        
        const poster = m.poster || '';
        const title = m.title || 'Untitled';
        const year = m.year || '';
        const season = m.season || '';
        const rating = m.rating || '0.0';
        const quality = m.quality || 'FHD';
        
        let displayTitle = title;
        if(year) displayTitle += ` (${year})`;
        
        let badgeClass = '';
        if(season && season.includes('EP')) badgeClass = 'green';
        
        const hasQuality = quality ? 'has-quality' : '';
        
        html += `
          <div class="movie-card ${hasQuality}" onclick="window.location.href='watch.html?id=${doc.id}'">
            ${quality ? `<span class="badge-quality">${quality}</span>` : ''}
            
            ${season ? `<div class="season-badge ${badgeClass}">${season}</div>` : ''}
            
            ${rating ? `<span class="badge-rating">★ ${rating}</span>` : ''}
            
            ${poster ? 
              `<img src="${poster}" loading="lazy" onerror="this.outerHTML='<div class=img-placeholder>?</div>'">` 
              : `<div class="img-placeholder">?</div>`
            }
            
            <div class="movie-info-bottom">
              <p class="movie-title">${displayTitle}</p>
            </div>
            
            <div class="play-overlay">▶</div>
          </div>
        `;
      });
      
      grid.innerHTML = html;
      
    } catch(err) {
      console.error("❌ Error:", err);
      grid.innerHTML = '<p style="color:red;">Error: ' + err.message + '</p>';
    }
  }
  
  loadTVShows();
  </script>

</body>
</html>
