<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Shows - MAGICAL MOVIE LAND</title>
  <link rel="stylesheet" href="style.css?v=19">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
  }
  
  h1 {
    font-size: 20px;
    margin-bottom: 15px;
    padding-left: 12px;
    border-left: 4px solid #ff2d95;
  }
  
  /* Cinesubz style grid */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  
  @media(max-width: 768px) {
    .movie-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
  }
  
  /* Card style - Cinesubz වගේ */
  .movie-card {
    position: relative;
    aspect-ratio: 2/3;
    border-radius: 6px;
    overflow: hidden;
    background: #111;
    cursor: pointer;
  }
  
  .movie-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  
  /* Season badge - කොළ/රතු */
  .season-badge {
    position: absolute;
    top: 6px;
    left: 6px;
    background: #22c55e; /* කොළ - ongoing */
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 5px;
    border-radius: 4px;
    z-index: 2;
    white-space: nowrap;
    max-width: 65%;
    text-overflow: ellipsis;
    overflow: hidden;
  }
  
  .season-badge.complete {
    background: #dc2626; /* රතු - complete */
  }
  
  /* Rating badge - කහ */
  .rating-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: #fbbf24;
    color: #000;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 5px;
    border-radius: 4px;
    z-index: 2;
  }
  
  /* Bottom title - gradient */
  .movie-info-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 35px 6px 6px 6px;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
    z-index: 2;
  }
  
  .movie-title {
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  
  .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 35px;
    color: #333;
    background: #1a1a1a;
  }
  
  /* Search Results List View */
.search-results {
  display: none;
  padding: 10px;
}

.search-results.active {
  display: block;
}

.search-result-item {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #222;
  cursor: pointer;
  transition: background 0.2s;
}

.search-result-item:hover {
  background: #1a1a1a;
}

.search-result-poster {
  width: 60px;
  height: 90px;
  border-radius: 4px;
  object-fit: cover;
  flex-shrink: 0;
}

.search-result-info {
  flex: 1;
  overflow: hidden;
}

.search-result-title {
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.search-result-meta {
  font-size: 13px;
  color: #aaa;
  line-height: 1.5;
}

.search-no-result {
  text-align: center;
  color: #666;
  padding: 50px 20px;
  font-size: 14px;
}

/* Search bar */
.search-box {
  position: absolute;
  top: 60px;
  left: 0;
  width: 100%;
  background: #0a0a0a;
  padding: 12px 15px;
  display: none;
  z-index: 999;
  border-bottom: 1px solid #222;
  box-sizing: border-box;
}
.search-box.active {
  display: flex;
  align-items: center;
  gap: 8px;
}
.search-box input {
  flex: 1;
  height: 45px;
  background: #1a1a1a;
  border: none;
  border-radius: 25px;
  padding: 0 20px;
  color: white;
  font-size: 16px;
  outline: none;
}
.search-box button {
  width: 45px;
  height: 45px;
  background: #e50914;
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#closeSearch {
  font-size: 22px;
  color: #888;
  cursor: pointer;
  flex-shrink: 0;
}
#closeSearch:hover {
  color: #ff2d95;
}

header {
  background: #111;
  padding: 12px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 999;
  border-bottom: 1px solid #222;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  white-space: nowrap;
}

.logo span {
  color: #ff2d95;
}

.header-right i {
  font-size: 20px;
  margin-left: 20px;
  cursor: pointer;
}

  </style>
</head>
<body>
  
  <header>
    <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
      <i class="fa fa-bars" id="menuBtn"></i>
    </div>
    
    <div class="search-box" id="searchBox">
      <input type="text" id="searchInput" placeholder="Search movies & TV shows...">
      <i class="fa fa-times" id="closeSearch"></i>
    </div>
  </header>

  <div class="home-search-results" id="homeSearchResults"></div>

  <div class="sidebar" id="sidebar">
    <span class="close-btn" id="closeSidebar">×</span>
    <ul>
      <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
      <li class="active"><a href="series.html"><i class="fa fa-tv"></i> TV Shows</a></li>
      <li><a href="chanels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
      <li><a href="about.html"><i class="fa fa-info-circle"></i> About</a></li>
      <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>
  
  <h1>TV Shows</h1>
  <div class="movie-grid" id="tvShowsGrid"></div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
    authDomain: "magical-movie-land.firebaseapp.com",
    projectId: "magical-movie-land",
    storageBucket: "magical-movie-land.firebasestorage.app",
    messagingSenderId: "27757424288",
    appId: "1:27757424288:web:d650e2659f09f0b9c823c5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadTVShows() {
    const grid = document.getElementById('tvShowsGrid');
    
    try {
      const q = query(collection(db, "movies"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      
      if(snapshot.empty) {
        grid.innerHTML = '<p style="text-align:center;color:#666;">TV Shows නැත</p>';
        return;
      }
      
      let html = '';
      snapshot.forEach(doc => {
        const m = doc.data();
        
        // tvshows or alltvshows විතරක්
        if(m.category !== 'tvshows' && m.category !== 'alltvshows') return;
        
        const poster = m.poster || '';
        const title = m.title || 'Untitled';
        const year = m.year || '';
        const season = m.season || '';
        const rating = m.rating || '0.0';
        
        // Title + year
        let displayTitle = title;
        if(year) displayTitle += ` (${year})`;
        
        // Season badge color - COMPLETE නම් රතු, EP නම් කොළ
        let badgeClass = '';
        if(season && season.toUpperCase().includes('COMPLETE')) {
          badgeClass = 'complete';
        }
        
        html += `
          <div class="movie-card" onclick="window.location.href='watch.html?id=${doc.id}'">
            ${season ? `<div class="season-badge ${badgeClass}">${season}</div>` : ''}
            
            ${rating ? `<div class="rating-badge">★ ${rating}</div>` : ''}
            
            ${poster ? 
              `<img src="${poster}" loading="lazy" onerror="this.outerHTML='<div class=img-placeholder>?</div>'">` 
              : `<div class="img-placeholder">?</div>`
            }
            
            <div class="movie-info-bottom">
              <p class="movie-title">${displayTitle}</p>
            </div>
          </div>
        `;
      });
      
      grid.innerHTML = html;
      
    } catch(err) {
      console.error("❌ Error:", err);
      grid.innerHTML = '<p style="color:red;">Error: ' + err.message + '</p>';
    }
  }
  
  loadTVShows();
  </script>

</body>
</html>
