<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Shows - MAGICAL MOVIE LAND</title>
  <link rel="icon" href="https://files.catbox.moe/nstkne.png" type="image/png">
  <link rel="stylesheet" href="style.css?v=25">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
  (function(){
    const theme = localStorage.getItem('theme') || 'dark';
    document.documentElement.className = theme;
  })();
  </script>
  <style>
  /* Index eke tiyena CSS tika witharai */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 15px;
  }
  .movie-card {
    background: #1a1a1a;
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.2s;
    cursor: pointer;
    position: relative;
  }
  .movie-card:active { transform: scale(0.95); }
  .movie-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    background: #222;
  }
  .movie-card h3 {
    font-size: 14px;
    padding: 8px;
    margin: 0;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .badge {
    position: absolute;
    top: 8px;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
  }
  .badge.ep { left: 8px; background: #00c853; color: #fff; }
  .badge.rate { right: 8px; background: #ffb300; color: #111; }
  
  /* Header + Search Box = Index eka same */
  header { background: #111; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 999; border-bottom: 1px solid #222; }
  .logo { font-size: 22px; font-weight: 700; white-space: nowrap; }
  .logo span { color: #ff2d95; }
  .header-right i { font-size: 20px; margin-left: 20px; cursor: pointer; }
  .sidebar { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: #1a1a1a; transition: right 0.3s ease; z-index: 1001; padding-top: 60px; }
  .sidebar.active { right: 0; }
  .sidebar ul { list-style: none; }
  .sidebar ul li a { display: block; padding: 15px 20px; color: white; text-decoration: none; border-bottom: 1px solid #333; }
  .sidebar ul li.active a, .sidebar ul li a:hover { background: #ff2d95; }
  .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
  .overlay.active { display: block; }
  .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; color: white; cursor: pointer; }
  .page-title { padding: 15px; font-size: 24px; font-weight: 700; border-left: 4px solid #ff2d95; margin: 15px; }
  .home-no-result { text-align: center; color: #666; padding: 50px 20px; font-size: 14px; }
  html.light .movie-card { background: #f5f5f5; }
  html.light .movie-card h3 { color: #111; }
  </style>
</head>
<body>
  <!-- Header = Index eka same -->
  <header>
    <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
      <i class="fa fa-bars" id="menuBtn"></i>
    </div>
  </header>

  <!-- Sidebar = Index eka same. TV Shows active -->
  <div class="sidebar" id="sidebar">
    <span class="close-btn" id="closeSidebar">×</span>
    <ul>
      <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
      <li class="active"><a href="tvshows.html"><i class="fa fa-tv"></i> TV Shows</a></li>
      <li><a href="request.html"><i class="fa fa-plus-circle"></i> Requests</a></li>
      <li><a href="chanels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
      <li><a href="about.html"><i class="fa fa-info-circle"></i> About</a></li>
      <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
      <li><a href="settings.html"><i class="fa fa-cog"></i> Settings</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>

  <!-- Title -->
  <div class="page-title">TV Shows</div>

  <!-- TV Shows Grid -->
  <div class="movie-grid" id="tvShowsGrid">
    <div class="home-no-result">Loading TV Shows...</div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
  authDomain: "magical-movie-land.firebaseapp.com",
  projectId: "magical-movie-land",
  storageBucket: "magical-movie-land.firebasestorage.app",
  messagingSenderId: "27757424288",
  appId: "1:27757424288:web:d650e2659f09f0b9c823c5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function createMovieCard(movie) {
  const poster = movie.poster || 'https://via.placeholder.com/150x220/222/fff';
  const title = movie.title || 'Untitled';
  const year = movie.year || '2024';
  const rate = movie.rating || '0.0';
  const ep = movie.episode ? `S${movie.season || '01'} EP${movie.episode}` : '';

  return `
    <div class="movie-card" onclick="window.location.href='watch.html?id=${movie.id}'">
      ${ep ? `<div class="badge ep">${ep}</div>` : ''}
      <div class="badge rate">★ ${rate}</div>
      <img src="${poster}" alt="${title}" loading="lazy">
      <h3>${title} (${year})</h3>
    </div>
  `;
}

async function loadTVShows() {
  try {
    const snapshot = await getDocs(collection(db, "movies"));
    const shows = [];
    
    snapshot.forEach(doc => {
      const m = doc.data();
      m.id = doc.id;
      // Series/TV filter eka
      if(m.category == "series" || m.category == "tvshows" || m.type == "series" || m.type == "tv") {
        if(m.title && m.poster) {
          shows.push(m);
        }
      }
    });
    
    const container = document.getElementById('tvShowsGrid');
    container.innerHTML = shows.length > 0 ? shows.map(createMovieCard).join('') : '<div class="home-no-result">TV Shows නෑ</div>';
    
  } catch(err) {
    console.error(err);
    document.getElementById('tvShowsGrid').innerHTML = '<div class="home-no-result">Error loading</div>';
  }
}

loadTVShows();

// Menu Toggle = Index eka same
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const closeSidebar = document.getElementById('closeSidebar');
menuBtn.onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
closeSidebar.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
</script>
</body>
</html>
