  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  html.dark { --bg: #0a0a0a; --bg-alt: #111; --card: #1a1a1a; --card-2: #222; --text: #fff; --text-dim: #aaa; --text-faint: #666; --border: #222; }
  html.light { --bg: #f4f4f4; --bg-alt: #ffffff; --card: #f5f5f5; --card-2: #e8e8e8; --text: #111; --text-dim: #444; --text-faint: #888; --border: #ddd; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; padding-bottom: 40px; }
  a { text-decoration: none; color: inherit; } img { display: block; }
  header { background: var(--bg-alt); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 999; border-bottom: 1px solid var(--border); }
  .logo { font-size: 22px; font-weight: 700; color: var(--text); } .logo span { color: #ff2d95; }
  .header-right { display: flex; align-items: center; } .header-right i { font-size: 20px; margin-left: 20px; cursor: pointer; color: var(--text); }
  .search-box { position: absolute; top: 60px; left: 0; width: 100%; background: var(--bg-alt); padding: 12px 15px; display: none; z-index: 999; border-bottom: 1px solid var(--border); }
  .search-box.active { display: flex; align-items: center; gap: 8px; } .search-box input { flex: 1; height: 45px; background: var(--card); border: none; border-radius: 25px; padding: 0 20px; color: var(--text); }
  .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: var(--bg-alt); z-index: 1001; transition: left 0.3s ease; padding: 20px 0; }
  .sidebar.active { left: 0; } .sidebar .close-btn { display: block; text-align: right; padding: 0 20px 15px; font-size: 26px; cursor: pointer; }
  .sidebar ul { list-style: none; } .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 14px 22px; color: var(--text-dim); }
  .sidebar li a i { color: #ff2d95; } .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: none; } .overlay.active { display: block; }
  .hero { position: relative; width: 100%; height: 220px; overflow: hidden; background: var(--card); }
  .hero-slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 0.6s ease; cursor: pointer; }
  .hero-slide.active { opacity: 1; } .hero-slide::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.1)); }
  .hero-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; } .hero-dots .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%; cursor: pointer; }
  .hero-dots .dot.active { background: #ff2d95; width: 20px; border-radius: 10px; }
  .trending { padding: 10px 0 5px; } .section-header { display: flex; align-items: center; justify-content: space-between; padding: 0 15px; margin-bottom: 10px; }
  .section-header h2 { font-size: 18px; } .view-all { font-size: 12px; color: #ff2d95; font-weight: 600; }
  .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 15px; min-height: 200px; }
  .movie-card { background: var(--card); border-radius: 8px; overflow: hidden; cursor: pointer; }
  .movie-card img { width: 100%; height: 220px; object-fit: cover; } .movie-card h3 { font-size: 14px; padding: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .footer { text-align: center; padding: 30px 20px; border-top: 1px solid var(--border); margin-top: 20px; }
  .details-hero { position: relative; min-height: 340px; background-size: cover; background-position: center top; display: flex; align-items: flex-end; padding: 20px 15px; }
  .details-hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 5%, rgba(10,10,10,0.55) 55%); }
  .details-poster { width: 110px; height: 160px; border-radius: 8px; object-fit: cover; } .details-title { font-size: 22px; font-weight: 700; color: #fff; }
  .player-wrap { padding: 0 15px 15px; display: none; } .player-wrap.active { display: block; }
  .player-container { position: relative; width: 100%; padding-top: 56.25%; background: #000; border-radius: 8px; overflow: hidden; }
  .player-container iframe, .player-container video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .home-no-result { text-align: center; color: var(--text-faint); padding: 30px 20px; }
  </style>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig = { apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M", authDomain: "magical-movie-land.firebaseapp.com", projectId: "magical-movie-land", storageBucket: "magical-movie-land.firebasestorage.app", messagingSenderId: "27757424288", appId: "1:27757424288:web:d650e2659f09f0b9c823c5" };
const app = initializeApp(firebaseConfig); const db = getFirestore(app);

const sidebar = document.getElementById('sidebar'); const overlay = document.getElementById('overlay');
document.getElementById('closeSidebar').onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); }
overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); }
document.getElementById('menuBtn').onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); }

const params = new URLSearchParams(window.location.search); const routeId = params.get('id'); const isAdminRoute = params.get('page') === 'admin';
const homeView = document.getElementById('homeView'); const watchView = document.getElementById('watchView'); const adminView = document.getElementById('adminView');
function showOnly(view) { homeView.style.display = view === 'home' ? '' : 'none'; watchView.style.display = view === 'watch' ? '' : 'none'; adminView.style.display = view === 'admin' ? '' : 'none'; }

let allContent = [];
function createMovieCard(m) { const poster = m.poster || 'https://via.placeholder.com/150x220/222/fff'; return `<div class="movie-card" onclick="window.open('index.html?id=${m.id}', '_blank')"><img src="${poster}" loading="lazy"><h3>${m.title}</h3></div>`; }
function loadHeroSlider() { const slidesBox = document.getElementById('heroSlides'); const featured = allContent.filter(m => m.backdrop || m.poster).slice(0, 6); if(featured.length === 0) return; slidesBox.innerHTML = featured.map((m, i) => `<div class="hero-slide ${i === 0 ? 'active' : ''}" style="background-image:url('${m.backdrop || m.poster}');" onclick="window.open('index.html?id=${m.id}', '_blank')"></div>`).join(''); }

// IMPORTANT: SECTIONS FILTER 3
function loadTrending() { document.getElementById('trendingMovies').innerHTML = allContent.filter(m => m.sections?.includes('trending_home')).slice(0,8).map(createMovieCard).join('') || '<div class="home-no-result">Trending na</div>'; }
function loadLatest() { document.getElementById('latestMovies').innerHTML = allContent.filter(m => m.sections?.includes('latest_home')).slice(0,8).map(createMovieCard).join('') || '<div class="home-no-result">Latest na</div>'; }
function loadTVShows() { document.getElementById('tvShowsMovies').innerHTML = allContent.filter(m => m.sections?.includes('tvshows_home')).slice(0,8).map(createMovieCard).join('') || '<div class="home-no-result">TV Shows na</div>'; }

async function initHome() {
  const snapshot = await getDocs(collection(db, "movies")); allContent = []; snapshot.forEach(d => { const m = d.data(); m.id = d.id; if(m.title && m.poster) allContent.push(m); });
  loadHeroSlider(); loadTrending(); loadLatest(); loadTVShows();
}

async function initWatch(id) {
  const root = document.getElementById('detailsRoot'); const snap = await getDoc(doc(db, "movies", id));
  if (!snap.exists()) { root.innerHTML = 'Not Found'; return; }
  const m = snap.data(); m.id = snap.id;
  root.innerHTML = `<div class="details-hero" style="background-image:url('${m.backdrop || m.poster}');"><img class="details-poster" src="${m.poster}"><div class="details-title">${m.title}</div></div><div style="padding:15px;"><button class="btn btn-primary" id="watchNowBtn"><i class="fa fa-play"></i> Watch Now</button><p style="margin-top:15px;">${m.description}</p></div><div class="player-wrap" id="playerWrap"><div class="player-container" id="playerBox"></div></div>`;
  document.getElementById('watchNowBtn').onclick = () => { document.getElementById('playerBox').innerHTML = `<iframe src="${m.videoUrl}" allowfullscreen></iframe>`; document.getElementById('playerWrap').classList.add('active'); }
}

// ADMIN SIMPLE
const ADMIN_PASSWORD = "Magical movie land 2026";
function initAdmin() {
  if (sessionStorage.getItem('mml_admin_auth') === 'true') { document.getElementById('loginWrap').style.display = 'none'; document.getElementById('adminPanel').classList.add('active'); }
  document.getElementById('unlockBtn').onclick = () => { if (document.getElementById('passInput').value === ADMIN_PASSWORD) { sessionStorage.setItem('mml_admin_auth', 'true'); location.reload(); } else { document.getElementById('passError').textContent = 'Password wrong'; } }
  document.getElementById('logoutBtn').onclick = () => { sessionStorage.removeItem('mml_admin_auth'); location.reload(); }
}

if (isAdminRoute) { showOnly('admin'); initAdmin(); } 
else if (routeId) { showOnly('watch'); initWatch(routeId); } 
else { showOnly('home'); initHome(); }
</script>
