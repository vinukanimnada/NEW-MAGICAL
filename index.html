<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGICAL MOVIE LAND</title>
  <link rel="stylesheet" href="style.css?v=19">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  .search-box {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    background: #0a0a0a;
    padding: 12px 15px;
    display: none;
    z-index: 999;
    border-bottom: 1px solid #222;
    box-sizing: border-box;
  }
  .search-box.active {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .search-box input {
    flex: 1;
    height: 45px;
    background: #1a1a1a;
    border: none;
    border-radius: 25px;
    padding: 0 20px;
    color: white;
    font-size: 16px;
    outline: none;
  }
  #closeSearch {
    font-size: 22px;
    color: #888;
    cursor: pointer;
  }
  #closeSearch:hover {
    color: #ff2d95;
  }

  .home-search-results {
    position: absolute;
    top: 120px;
    left: 0;
    width: 100%;
    background: #0a0a0a;
    max-height: 70vh;
    overflow-y: auto;
    display: none;
    z-index: 998;
    border-bottom: 1px solid #222;
  }
  .home-search-results.active {
    display: block;
  }
  .home-result-item {
    display: flex;
    gap: 12px;
    padding: 12px 15px;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: background 0.2s;
  }
  .home-result-item:hover {
    background: #1a1a1a;
  }
  .home-result-poster {
    width: 50px;
    height: 75px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .home-result-info {
    flex: 1;
    overflow: hidden;
  }
  .home-result-title {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .home-result-meta {
    font-size: 13px;
    color: #aaa;
  }
  .home-result-type {
    font-size: 11px;
    color: #ff2d95;
    margin-top: 2px;
    font-weight: 600;
  }
  .home-no-result {
    text-align: center;
    color: #666;
    padding: 30px 20px;
    font-size: 14px;
  }
  </style>
</head>
<body>
  <header>
    <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
      <i class="fa fa-bars" id="menuBtn"></i>
    </div>
    
    <div class="search-box" id="searchBox">
      <input type="text" id="searchInput" placeholder="Search movies & TV shows...">
      <i class="fa fa-times" id="closeSearch"></i>
    </div>
  </header>

  <div class="home-search-results" id="homeSearchResults"></div>

  <div class="sidebar" id="sidebar">
    <span class="close-btn" id="closeSidebar">×</span>
    <ul>
      <li class="active"><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
      <li><a href="series.html"><i class="fa fa-tv"></i> TV Shows</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>

  <!-- උඹේ hero, trending sections මෙතන -->

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
    authDomain: "magical-movie-land.firebaseapp.com",
    projectId: "magical-movie-land",
    storageBucket: "magical-movie-land.firebasestorage.app",
    messagingSenderId: "27757424288",
    appId: "1:27757424288:web:d650e2659f09f0b9c823c5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let allContent = [];

  // Movies.html + Series.html දෙකේම data load කරනවා
  async function loadAllContent() {
    try {
      const snapshot = await getDocs(collection(db, "movies"));
      
      allContent = [];
      snapshot.forEach(doc => {
        const m = doc.data();
        m.id = doc.id;
        
        // Category filter නෑ - හැම එකම ගන්නවා
        // movies.html = allmovies, series.html = series/tvshows
        // type field එකත් check කරනවා movie/series
        if(m.title && m.poster) {
          allContent.push(m);
        }
      });
      
      console.log("✅ Loaded:", allContent.length, "items for search");
    } catch(err) {
      console.error("❌ Error:", err);
    }
  }

  loadAllContent();

  const searchBtn = document.getElementById('searchBtn');
  const searchBox = document.getElementById('searchBox');
  const closeSearch = document.getElementById('closeSearch');
  const searchInput = document.getElementById('searchInput');
  const homeSearchResults = document.getElementById('homeSearchResults');

  searchBtn?.addEventListener('click', () => {
    searchBox.classList.toggle('active');
    if(searchBox.classList.contains('active')) {
      searchInput.focus();
    } else {
      homeSearchResults.classList.remove('active');
      searchInput.value = '';
    }
  });

  closeSearch?.addEventListener('click', () => {
    searchBox.classList.remove('active');
    homeSearchResults.classList.remove('active');
    searchInput.value = '';
  });

  function homeSearch(query) {
    if(!query.trim()) {
      homeSearchResults.classList.remove('active');
      return;
    }

    homeSearchResults.classList.add('active');

    const filtered = allContent.filter(m =>
      m.title && m.title.toLowerCase().includes(query.toLowerCase())
    );

    if(filtered.length === 0) {
      homeSearchResults.innerHTML = '<div class="home-no-result">🔍 Results හමු නොවීය</div>';
      return;
    }

    homeSearchResults.innerHTML = filtered.slice(0, 12).map(m => {
      const poster = m.poster || 'https://via.placeholder.com/50x75/222/fff';
      const year = m.year || 'N/A';
      
      // Type detect කරනවා
      let type = "Movie";
      if(m.category == "series" || m.category == "tvshows" || m.type == "series") {
        type = "TV Show";
      }
      
      let title = m.title;
      if(title.length > 35) title = title.substring(0, 35) + '...';

      return `
        <div class="home-result-item" onclick="window.location.href='watch.html?id=${m.id}'">
          <img src="${poster}" class="home-result-poster" loading="lazy">
          <div class="home-result-info">
            <div class="home-result-title">${title}</div>
            <div class="home-result-meta">${year}</div>
            <div class="home-result-type">${type}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  let searchTimeout;
  searchInput?.addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      homeSearch(e.target.value);
    }, 300);
  });
  </script>
</body>
</html>
