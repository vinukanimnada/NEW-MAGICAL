<head>

  <title>MAGICAL MOVIE LAND - Free HD Cartoon Movies Online</title>

  <meta name="description" content="Watch free HD cartoon movies online. Diary of a Wimpy Kid, Ne Zha, Elemental and more. No ads, fast streaming on MAGICAL MOVIE LAND.">
  <meta name="keywords" content="cartoon movies, free movies online, HD movies, Magical Movie Land">

  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
  /* ===== WATCH BUTTON + TEXT HIDE ===== */
  .hero-slide p, 
  .hero-slide .desc,
  .hero-slide .watch-btn,
  .hero-slide button,
  .hero-slide h1,
  .hero-slide .imdb,
  .hero-slide .year {
    display: none !important;
  }

  /* Slider dots */
  .hero-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 2;
  }
  .hero-dots .dot {
    width: 8px;
    height: 8px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    cursor: pointer;
    transition: 0.3s;
  }
  .hero-dots .dot.active {
    background: #ff2d95;
    width: 20px;
    border-radius: 10px;
  }
  
  /* ===== SIDEBAR - PADI VERSION ===== */
  .sidebar {
    position: fixed;
    top: 0;
    right: -200px;
    width: 200px;
    height: 100%;
    background: #1a1a1a;
    transition: right 0.3s ease;
    z-index: 1001;
    padding-top: 50px;
  }
  .sidebar.active {
    right: 0;
  }
  .sidebar ul {
    list-style: none;
    padding: 0;
  }
  .sidebar ul li a {
    display: flex;
    align-items: center;
    padding: 12px 15px;
    color: white;
    text-decoration: none;
    font-size: 14px;
    border-bottom: 1px solid #2a2a2a;
    transition: 0.2s;
  }
  .sidebar ul li a i {
    margin-right: 10px;
    font-size: 16px;
    width: 18px;
  }
  .sidebar ul li a:hover {
    background: #2a2a2a;
  }
  .sidebar ul li.active a {
    background: #ff2d95;
    color: white;
    border-radius: 6px;
    margin: 0 8px;
    padding: 12px 7px;
    border-bottom: none;
  }
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    z-index: 1000;
  }
  .overlay.active {
    display: block;
  }
  .close-btn {
    position: absolute;
    top: 12px;
    right: 15px;
    font-size: 26px;
    color: #ccc;
    cursor: pointer;
    z-index: 1002;
    transition: 0.2s;
  }
  .close-btn:hover {
    color: #ff2d95;
  }
  
  /* Mobile sidebar තව පොඩි */
  @media (max-width: 480px){
    .sidebar {
      width: 180px !important;
      right: -180px;
      padding-top: 45px;
    }
    .sidebar ul li a{
      padding: 10px 12px;
      font-size: 13px;
    }
    .close-btn{
      font-size: 24px;
      top: 10px;
      right: 12px;
    }
  }
  
  /* Search Bar */
  .search-box {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    background: #0a0a0a;
    padding: 12px 15px;
    display: none;
    z-index: 999;
    border-bottom: 1px solid #222;
    box-sizing: border-box;
  }
  .search-box.active {
    display: flex;
    align-items: center;
  }
  .search-box input {
    flex: 1;
    height: 45px;
    background: #1a1a1a;
    border: none;
    border-radius: 25px;
    padding: 0 45px 0 20px;
    color: white;
    font-size: 16px;
    outline: none;
  }
  .search-box input::placeholder {
    color: #666;
  }
  #closeSearch {
    position: absolute;
    right: 30px;
    font-size: 20px;
    color: #888;
    cursor: pointer;
  }
  #closeSearch:hover {
    color: #ff2d95;
  }
  </style>
</head>
<body>

    <ul>

  <div class="overlay" id="overlay"></div>

  <!-- ===== HERO SLIDER ===== -->
  <section class="hero" id="heroSlider">

    <div class="hero-dots" id="heroDots"></div>
  </section>
  
  <!-- Daily Trending -->
  <section class="trending">
    <div class="section-header">
      <h2 style="position:relative; padding-left:12px;">
        <span style="position:absolute; left:0; top:50%; transform:translateY(-50%); width:4px; height:28px; background:#ff2d95; border-radius:2px;"></span>
       Daily Trending
      </h2>
      <a href="movies.html" class="view-all">VIEW ALL</a>
    </div>
    <div class="movie-grid" id="trendingMovies"></div>
  </section>
  
  <!-- Latest Uploads -->
  <section class="trending">
    <div class="section-header">
      <h2 style="position:relative; padding-left:12px;">
        <span style="position:absolute; left:0; top:50%; transform:translateY(-50%); width:4px; height:28px; background:#ff2d95; border-radius:2px;"></span>
        Latest Uploads
      </h2>
      <a href="movies.html" class="view-all">VIEW ALL</a>
    </div>
    <div class="movie-grid" id="latestMovies"></div>
  </section>

  <!-- TV Shows Section -->
  <section class="trending">
    <div class="section-header">
      <h2 style="position:relative; padding-left:12px;">
        <span style="position:absolute; left:0; top:50%; transform:translateY(-50%); width:4px; height:28px; background:#ff2d95; border-radius:2px;"></span>
        TV Shows
      </h2>
      <a href="tvshows.html" class="view-all">VIEW ALL</a>
    </div>

  <!-- Firebase + Site JS -->
