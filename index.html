  <style>
  /* ===== WATCH BUTTON + TEXT HIDE ===== */
  .hero-slide p, 
  .hero-slide .desc,
  .hero-slide .watch-btn,
  .hero-slide button,
  .hero-slide h1,
  .hero-slide .imdb,
  .hero-slide .year {
    display: none !important;
  }

  /* Hero swipe - inline CSS */
  .hero{
    width: 95%;
    height: 200px;
    border-radius: 20px;
    margin: 15px auto 0 auto;
    position: relative;
    overflow: hidden;
    background: #000;
    touch-action: pan-y;
    cursor: grab;
  }

  .hero:active{
    cursor: grabbing;
  }

  #heroSlides{
    width: 100%;
    height: 100%;
    display: flex;
    transition: transform 0.4s ease-out;
  }

  .hero-slide{
    min-width: 100%;
    height: 100%;
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
  }

  .hero-slide::after{
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to right, rgba(0,0,0,0.3) 0%, transparent 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* Slider dots */
  .hero-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 10;
  }
  .hero-dots .dot {
    width: 8px;
    height: 8px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    cursor: pointer;
    transition: 0.3s;
  }
  .hero-dots .dot.active {
    background: #ff2d95;
    width: 20px;
    border-radius: 10px;
  }
  
  /* Search Bar */
  .search-box {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    background: #0a0a0a;
    padding: 12px 15px;
    display: none;
    z-index: 999;
    border-bottom: 1px solid #222;
    box-sizing: border-box;
  }
  .search-box.active {
    display: flex;
    align-items: center;
  }
  .search-box input {
    flex: 1;
    height: 45px;
    background: #1a1a1a;
    border: none;
    border-radius: 25px;
    padding: 0 45px 0 20px;
    color: white;
    font-size: 16px;
    outline: none;
  }
  .search-box input::placeholder {
    color: #666;
  }
  #closeSearch {
    position: absolute;
    right: 30px;
    font-size: 20px;
    color: #888;
    cursor: pointer;
  }
  #closeSearch:hover {
    color: #ff2d95;
  }

  @media (max-width: 600px){
    .hero{
      height: 170px;
      width: 92%;
      border-radius: 16px;
    }
  }
  </style>

  <!-- Firebase + Site JS -->
  <script type="module" src="script.js"></script>
  
  <!-- Menu + Search + Hero Swipe JS -->
  <script>
  // Menu + Search
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const closeSidebar = document.getElementById('closeSidebar');
  const overlay = document.getElementById('overlay');
  const searchBtn = document.getElementById('searchBtn');
  const searchBox = document.getElementById('searchBox');
  const closeSearch = document.getElementById('closeSearch');

  menuBtn?.addEventListener('click', () => {
    sidebar.classList.add('active');
    overlay.classList.add('active');
  });

  closeSidebar?.addEventListener('click', () => {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
  });

  overlay?.addEventListener('click', () => {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
  });

  searchBtn?.addEventListener('click', () => {
    searchBox.classList.toggle('active');
    if(searchBox.classList.contains('active')) {
      searchBox.querySelector('input').focus();
    }
  });
  closeSearch?.addEventListener('click', () => {
    searchBox.classList.remove('active');
  });

  // ===== HERO SWIPE CODE =====
  let currentSlide = 0;
  let slides = [];
  let dots = [];
  const heroSlides = document.getElementById('heroSlides');
  const heroDots = document.getElementById('heroDots');
  let totalSlides = 0;
  let startX = 0;
  let currentX = 0;
  let isDragging = false;
  let autoSlideInterval;

  // Hero slides load වෙනකන් wait කරලා dots + swipe enable කරනවා
  function initHeroSlider() {
    slides = document.querySelectorAll('.hero-slide');
    totalSlides = slides.length;
    
    if(totalSlides === 0) {
      setTimeout(initHeroSlider, 500); // script.js load වෙනකන් wait
      return;
    }

    // Dots create කරනවා
    heroDots.innerHTML = '';
    for(let i = 0; i < totalSlides; i++) {
      const dot = document.createElement('span');
      dot.classList.add('dot');
      if(i === 0) dot.classList.add('active');
      dot.addEventListener('click', () => updateSlide(i));
      heroDots.appendChild(dot);
    }
    dots = document.querySelectorAll('.hero-dots .dot');

    updateSlide(0);
    startAutoSlide();
    enableSwipe();
  }

  function updateSlide(index) {
    if(index < 0) index = totalSlides - 1;
    if(index >= totalSlides) index = 0;
    currentSlide = index;
    
    heroSlides.style.transform = `translateX(-${currentSlide * 100}%)`;
    
    dots.forEach((dot, i) => {
      dot.classList.toggle('active', i === currentSlide);
    });
  }

  function startAutoSlide() {
    stopAutoSlide();
    autoSlideInterval = setInterval(() => {
      if(!isDragging) updateSlide(currentSlide + 1);
    }, 5000);
  }

  function stopAutoSlide() {
    clearInterval(autoSlideInterval);
  }

  function enableSwipe() {
    // Touch events - Mobile
    heroSlides.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      isDragging = true;
      stopAutoSlide();
      heroSlides.style.transition = 'none';
    });

    heroSlides.addEventListener('touchmove', (e) => {
      if(!isDragging) return;
      currentX = e.touches[0].clientX;
      const diff = currentX - startX;
      heroSlides.style.transform = `translateX(calc(-${currentSlide * 100}% + ${diff}px))`;
    });

    heroSlides.addEventListener('touchend', () => {
      if(!isDragging) return;
      isDragging = false;
      heroSlides.style.transition = 'transform 0.4s ease-out';
      
      const diff = currentX - startX;
      if(Math.abs(diff) > 50) {
        if(diff > 0) updateSlide(currentSlide - 1);
        else updateSlide(currentSlide + 1);
      } else {
        updateSlide(currentSlide);
      }
      startAutoSlide();
    });

    // Mouse drag - PC
    heroSlides.addEventListener('mousedown', (e) => {
      startX = e.clientX;
      isDragging = true;
      stopAutoSlide();
      heroSlides.style.transition = 'none';
      e.preventDefault();
    });

    heroSlides.addEventListener('mousemove', (e) => {
      if(!isDragging) return;
      currentX = e.clientX;
      const diff = currentX - startX;
      heroSlides.style.transform = `translateX(calc(-${currentSlide * 100}% + ${diff}px))`;
    });

    heroSlides.addEventListener('mouseup', () => {
      if(!isDragging) return;
      isDragging = false;
      heroSlides.style.transition = 'transform 0.4s ease-out';
      
      const diff = currentX - startX;
      if(Math.abs(diff) > 50) {
        if(diff > 0) updateSlide(currentSlide - 1);
        else updateSlide(currentSlide + 1);
      } else {
        updateSlide(currentSlide);
      }
      startAutoSlide();
    });

    heroSlides.addEventListener('mouseleave', () => {
      if(isDragging) {
        isDragging = false;
        heroSlides.style.transition = 'transform 0.4s ease-out';
        updateSlide(currentSlide);
        startAutoSlide();
      }
    });
  }

  // Page load වෙනකොට hero slider init
  document.addEventListener('DOMContentLoaded', initHeroSlider);
  </script>
</body>
