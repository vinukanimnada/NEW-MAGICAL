  <style>
    /* Hero Slider Styles - වම් පැත්ත dark gradient */
    .hero-slider {
        position: relative;
        width: 100%;
        height: 55vh;
        overflow: hidden;
        margin-bottom: 30px;
    }
    .hero-slides {
        display: flex;
        transition: transform 0.5s ease-in-out;
        height: 100%;
    }
    .hero-slide {
        min-width: 100%;
        height: 100%;
        position: relative;
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: flex-end;
    }
    .hero-slide::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.7) 30%, rgba(0,0,0,0.3) 60%, transparent 100%);
    }
    .hero-content {
        position: relative;
        z-index: 2;
        padding: 30px 20px;
        color: white;
        max-width: 600px;
        text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }
    .hero-content h2 {
        font-size: 32px;
        margin: 0 0 10px 0;
        line-height: 1.2;
        font-weight: 700;
    }
    .hero-meta {
        display: flex;
        gap: 15px;
        align-items: center;
        margin-bottom: 10px;
        font-size: 15px;
    }
    .hero-imdb {
        background: #f5c518;
        color: #000;
        padding: 4px 10px;
        border-radius: 4px;
        font-weight: bold;
    }
    .hero-category { color: #ccc; }
    .hero-desc {
        font-size: 14px;
        color: #ddd;
        margin-bottom: 20px;
        line-height: 1.5;
    }
    .hero-btn {
        background: linear-gradient(90deg, #ff1493, #ff69b4);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
    }
    .hero-btn:hover { opacity: 0.9; }
    .hero-dots {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 3;
    }
    .hero-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255,255,255,0.4);
        cursor: pointer;
        transition: 0.3s;
    }
    .hero-dot.active {
        width: 25px;
        border-radius: 4px;
        background: #ff1493;
    }
    @media (max-width: 768px) {
        .hero-slider { height: 45vh; }
        .hero-content h2 { font-size: 22px; }
        .hero-desc { font-size: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hero-content { padding: 20px 15px; }
        .hero-btn { padding: 10px 22px; font-size: 14px; }
    }
  </style>
</head>

  <!-- Firebase Hero Slider Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
      authDomain: "magical-movie-land.firebaseapp.com",
      projectId: "magical-movie-land",
      storageBucket: "magical-movie-land.firebasestorage.app",
      messagingSenderId: "27757424288",
      appId: "1:27757424288:web:d650e2659f09f0b9c823c5",
      measurementId: "G-KK84DYV9EP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadHeroSlider() {
        const heroSlides = document.getElementById('heroSlides');
        const heroDots = document.getElementById('heroDots');
        
        if(!heroSlides) return;
        
        // Firebase එකෙන් featured: true movies 5 ගන්න
        const q = query(collection(db, "movies"), where("featured", "==", true), limit(5));
        const querySnapshot = await getDocs(q);
        
        if(querySnapshot.empty) {
            document.getElementById('heroSlider').style.display = 'none';
            return;
        }
        
        let slidesHTML = '';
        let dotsHTML = '';
        let index = 0;
        
        querySnapshot.forEach((doc) => {
            const m = doc.data();
            const movieId = doc.id;
            
            slidesHTML += `
            <div class="hero-slide" style="background-image: url('${m.banner || m.poster || 'https://via.placeholder.com/1920x1080/000/fff?text=No+Banner'}')">
                <div class="hero-content">
                    <h2>${m.title || 'Movie Title'}</h2>
                    <div class="hero-meta">
                        ${m.imdbRating ? `<span class="hero-imdb">IMDb: ${m.imdbRating}</span>` : ''}
                        <span>${m.year || '2024'}</span>
                        <span class="hero-category">${m.genres || 'Movie'}</span>
                    </div>
                    <p class="hero-desc">${m.description ? m.description.substring(0, 120) + '...' : ''}</p>
                    <a href="movie.html?id=${movieId}" class="hero-btn">
                        <i class="fa fa-play"></i> WATCH NOW
                    </a>
                </div>
            </div>`;
            
            dotsHTML += `<div class="hero-dot ${index === 0 ? 'active' : ''}" onclick="goToSlide(${index})"></div>`;
            index++;
        });
        
        heroSlides.innerHTML = slidesHTML;
        heroDots.innerHTML = dotsHTML;
        
        // Auto slide 5sec
        let currentSlide = 0;
        setInterval(() => {
            currentSlide = (currentSlide + 1) % index;
            goToSlide(currentSlide);
        }, 5000);
    }

    window.goToSlide = function(n) {
        const slides = document.getElementById('heroSlides');
        const dots = document.querySelectorAll('.hero-dot');
        slides.style.transform = `translateX(-${n * 100}%)`;
        dots.forEach((dot, i) => {
            dot.classList.toggle('active', i === n);
        });
    }

    // Page load වෙනකොට hero slider load කරපන්
    loadHeroSlider();

    // Sidebar + Search toggle - උඹේ පරණ code
    document.getElementById('menuBtn').onclick = () => {
      document.getElementById('sidebar').classList.add('active');
      document.getElementById('overlay').classList.add('active');
    }
    document.getElementById('closeSidebar').onclick = () => {
      document.getElementById('sidebar').classList.remove('active');
      document.getElementById('overlay').classList.remove('active');
    }
    document.getElementById('overlay').onclick = () => {
      document.getElementById('sidebar').classList.remove('active');
      document.getElementById('overlay').classList.remove('active');
    }
    document.getElementById('searchBtn').onclick = () => {
      document.getElementById('searchBox').classList.toggle('active');
    }
    document.getElementById('closeSearch').onclick = () => {
      document.getElementById('searchBox').classList.remove('active');
    }
  </script>

  <!-- Firebase Code - script.js එකට move කරා -->
  <script type="module" src="script.js"></script>
</body>
