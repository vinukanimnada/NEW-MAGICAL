<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Movies - Magical Movie Land</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
}

h1 {
  text-align: center;
  color: #ff2d95;
  margin: 20px 0 30px;
  font-size: 24px;
}

/* Cinesubz Grid - Mobile 3x3 */
.movie-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 10px;
  background: #000;
}

/* Desktop 5x grid */
@media (min-width: 768px) {
.movie-grid {
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    padding: 20px;
  }
}

.movie-card {
  position: relative;
  border-radius: 6px;
  overflow: hidden;
  background: #111;
  cursor: pointer;
  transition: transform 0.2s;
  aspect-ratio: 2/3; /* Cinesubz poster ratio */
}

.movie-card:hover {
  transform: scale(1.05);
}

.movie-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  background: #222;
}

/* Top Left - WEB-DL RED Badge */
.quality-badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: #e50914;
  padding: 2px 5px;
  font-size: 10px;
  font-weight: 700;
  border-radius: 3px;
  color: white;
  z-index: 3;
  text-transform: uppercase;
  line-height: 1;
}

/* Top Right - ★ Rating YELLOW Badge */
.rating-badge {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #ffc107;
  color: #000;
  padding: 2px 5px;
  font-size: 10px;
  font-weight: 700;
  border-radius: 3px;
  z-index: 3;
  line-height: 1;
}

/* Bottom Title - Left align + Gradient overlay */
.movie-title {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px 6px 6px;
  font-size: 12px;
  text-align: left;
  font-weight: 500;
  color: #fff;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 50%, transparent);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  z-index: 2;
  line-height: 1.2;
}

.no-movies {
  text-align: center;
  color: #666;
  padding: 50px 0;
  grid-column: 1/-1;
}

</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
  <div class="header-right">
    <i class="fa fa-search" id="searchBtn"></i>
    <i class="fa fa-bars" id="menuBtn"></i>
  </div>

  <div class="search-box" id="searchBox">
    <input type="text" placeholder="Search movies...">
    <i class="fa fa-times" id="closeSearch"></i>
  </div>
</header>

<!-- Sidebar Menu -->
<div class="sidebar" id="sidebar">
  <span class="close-btn" id="closeSidebar">×</span>
  <ul>
    <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
    <li class="active"><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
    <li><a href="series.html"><i class="fa fa-tv"></i> TV Shows</a></li>
    <li><a href="chanels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
    <li><a href="about.html"><i class="fa fa-info-circle"></i> About</a></li>
    <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
  </ul>
</div>
<div class="overlay" id="overlay"></div>

<h1>🎬 All Movies</h1>

<div class="movie-grid" id="movieGrid">
  <div class="no-movies">Loading movies...</div>
</div>

<div class="movie-grid" id="movieGrid">
  <div class="no-movies">Loading movies...</div>
</div>

<!-- Search Results List -->
<div class="search-results" id="searchResults"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
  authDomain: "magical-movie-land.firebaseapp.com",
  projectId: "magical-movie-land",
  storageBucket: "magical-movie-land.firebasestorage.app",
  messagingSenderId: "27757424288",
  appId: "1:27757424288:web:d650e2659f09f0b9c823c5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const grid = document.getElementById('movieGrid');

// Movies load කරනවා - Index නැතුව
async function loadMovies() {
  try {
    const q = query(
      collection(db, "movies"),
      where("category", "==", "allmovies"),
      where("type", "==", "movie")
    );
    const snapshot = await getDocs(q);

    if(snapshot.empty) {
      grid.innerHTML = '<div class="no-movies">Movies නැත. Admin එකෙන් "All Movies Page" select කරලා add කරපන්.</div>';
      return;
    }

    grid.innerHTML = "";

    snapshot.forEach(doc => {
      const m = doc.data();
      const poster = m.poster || 'https://via.placeholder.com/300x450/222/fff?text=No+Image';

      let rating = m.imdbRating? m.imdbRating.toString().split('/')[0] : '0.0';
      if(!rating.includes('.')) rating += '.0'; // 7 → 7.0 format
      const quality = (m.quality || 'WEB-DL').toUpperCase();

      // Title 20 chars limit +...
      let title = m.title || 'Untitled';
      if(title.length > 20) title = title.substring(0, 20) + '...';

      const card = `
        <div class="movie-card" onclick="openMovie('${doc.id}')">
          <span class="quality-badge">${quality}</span>
          <span class="rating-badge">★ ${rating}</span>
          <img src="${poster}" alt="${m.title}" loading="lazy">
          <div class="movie-title">${title}</div>
        </div>
      `;
      grid.innerHTML += card;
    });
  } catch(err) {
    console.error(err);
    grid.innerHTML = `<div class="no-movies">Error: ${err.message}</div>`;
  }
}

window.openMovie = function(id) {
  window.location.href = `watch.html?id=${id}`;
}

loadMovies();
</script>

<!-- Menu + Search JS -->
<script>
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const closeSidebar = document.getElementById('closeSidebar');
const overlay = document.getElementById('overlay');
const searchBtn = document.getElementById('searchBtn');
const searchBox = document.getElementById('searchBox');
const closeSearch = document.getElementById('closeSearch');

menuBtn?.addEventListener('click', () => {
  sidebar.classList.add('active');
  overlay.classList.add('active');
});

closeSidebar?.addEventListener('click', () => {
  sidebar.classList.remove('active');
  overlay.classList.remove('active');
});

overlay?.addEventListener('click', () => {
  sidebar.classList.remove('active');
  overlay.classList.remove('active');
});

searchBtn?.addEventListener('click', () => {
  searchBox.classList.toggle('active');
  if(searchBox.classList.contains('active')) {
    searchBox.querySelector('input').focus();
  }
});
closeSearch?.addEventListener('click', () => {
  searchBox.classList.remove('active');
});
</script>

</body>
</html>
