<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Series - Magical Movie Land</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    * {margin:0; padding:0; box-sizing:border-box;}
  
  /* Header */
  header {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #000;
    padding: 15px 20px;
    z-index: 1000;
  }
  .logo {color: white; font-size: 20px; font-weight: bold;}
  .logo span {color: #ff2d95;}
  .header-right i {color: white; font-size: 22px; margin-left: 20px; cursor: pointer;}

  /* Sidebar - padding-top අයින් කරා */
  .sidebar {
    position: fixed;
    top: 0;
    right: -300px;
    width: 280px;
    height: 100%;
    background: #1a1a1a;
    transition: right 0.3s ease;
    z-index: 9999; /* z-index වැඩි කරා */
  }
  .sidebar.active {right: 0;}
  
  /* Close button - උඩම corner එකටම */
  .close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 35px;
    color: white;
    cursor: pointer;
    z-index: 10000; /* z-index තව වැඩි කරා */
    line-height: 1;
    font-weight: bold;
  }
  .close-btn:hover {color: #ff2d95;}

  /* Menu items පහලට */
  .sidebar ul {
    list-style: none;
    padding: 0;
    margin-top: 60px; /* close button එකට ඉඩ */
  }
  .sidebar ul li a {
    display: block;
    padding: 15px 20px;
    color: white;
    text-decoration: none;
    border-bottom: 1px solid #333;
  }
  .sidebar ul li.active a {
    background: #ff2d95;
    color: white;
  }

  /* Overlay */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    z-index: 9998;
  }
  .overlay.active {display: block;}

  /* Search Bar */
  .search-box {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    background: #0a0a0a;
    padding: 12px 15px;
    display: none;
    z-index: 999;
    border-bottom: 1px solid #222;
    box-sizing: border-box;
  }
  .search-box.active {display: flex; align-items: center;}
  .search-box input {
    flex: 1;
    height: 45px;
    background: #1a1a1a;
    border: none;
    border-radius: 25px;
    padding: 0 45px 0 20px;
    color: white;
    font-size: 16px;
    outline: none;
  }
  #closeSearch {
    position: absolute;
    right: 30px;
    font-size: 20px;
    color: #888;
    cursor: pointer;
  }
  </style>
</head>
<body style="background:#111; color:white; font-family:Arial;">

  <!-- Header -->
  <header>
    <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠𝗢𝗩𝗜𝗘 𝗟𝗔𝗡𝗗</span></div> 
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
      <i class="fa fa-bars" id="menuBtn"></i>
    </div>
  </header>

  <!-- Search Bar -->
  <div class="search-box" id="searchBox">
    <input type="text" placeholder="Search cartoons or movies...">
    <i class="fa fa-times" id="closeSearch"></i>
  </div>

  <!-- Sidebar - close-btn උඩම -->
  <div class="sidebar" id="sidebar">
    <span class="close-btn" id="closeSidebar">×</span>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li class="active"><a href="movies.html">All Movies</a></li>
      <li><a href="series.html">TV Shows</a></li>
      <li><a href="chanels.html">Join Chanels</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>
  
  <!-- Page Content -->
  <section style="padding: 50px 20px; text-align: center;">
    <h1 style="font-size: 32px; margin-bottom: 20px;">Series</h1>
    <p style="color: #aaa; font-size: 16px;">මෙතනට ඔයාගේ Series list එක දාන්න</p>
    <br><br>
    <a href="index.html" style="display: inline-block; padding: 12px 25px; background: #e50914; color: #fff; text-decoration: none; border-radius: 4px; font-weight: bold;">← Back to Home</a>
  </section>

  <script>
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const closeSidebar = document.getElementById('closeSidebar');
  const overlay = document.getElementById('overlay');
  const searchBtn = document.getElementById('searchBtn');
  const searchBox = document.getElementById('searchBox');
  const closeSearch = document.getElementById('closeSearch');

  menuBtn.onclick = () => {
    sidebar.classList.add('active');
    overlay.classList.add('active');
  }

  closeSidebar.onclick = () => {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
  }

  overlay.onclick = () => {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
  }

  searchBtn.onclick = () => {
    searchBox.classList.toggle('active');
    if(searchBox.classList.contains('active')) {
      searchBox.querySelector('input').focus();
    }
  }
  
  closeSearch.onclick = () => {
    searchBox.classList.remove('active');
  }
  </script>
</body>
</html>
