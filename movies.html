<!DOCTYPE html>
<html>
<head>
<style>
body {
  background: #0e0e0e;
  color: #fff;
  font-family: Arial;
  margin: 0;
  padding: 20px;
}

.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
}

.movie-card {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: #1a1a1a;
  transition: transform 0.2s;
}

.movie-card:hover {
  transform: scale(1.05);
}

.movie-card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

.quality-badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: red;
  padding: 3px 6px;
  font-size: 11px;
  font-weight: bold;
  border-radius: 4px;
}

.rating-badge {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #ffc107;
  color: #000;
  padding: 3px 6px;
  font-size: 11px;
  font-weight: bold;
  border-radius: 4px;
}

.movie-title {
  padding: 8px;
  font-size: 13px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>
</head>
<body>

<div class="movie-grid" id="movieGrid">
  <!-- Firebase එකෙන් movies load වෙයි -->
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  // උඹේ Firebase config එක දාපන්
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const grid = document.getElementById('movieGrid');

// Movies load කරන function එක
async function loadMovies() {
  const q = query(collection(db, "movies"), orderBy("year", "desc"));
  const snapshot = await getDocs(q);
  
  grid.innerHTML = "";
  
  snapshot.forEach(doc => {
    const m = doc.data();
    const card = `
      <div class="movie-card" onclick="openMovie('${doc.id}')">
        <span class="quality-badge">${m.quality || 'WEB-DL'}</span>
        <span class="rating-badge">★ ${m.rating || '0.0'}</span>
        <img src="${m.image}" alt="${m.title}">
        <div class="movie-title">${m.title}</div>
      </div>
    `;
    grid.innerHTML += card;
  });
}

function openMovie(id) {
  window.location.href = `watch.html?id=${id}`;
}

loadMovies();
</script>
</body>
</html>
