<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Series - Magical Movie Land</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
  body {
  background: #0e0e0e;
  color: #fff;
  font-family: Arial;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #ff2d95;
  margin: 20px 0 30px;
}

.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
}

.movie-card {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: #1a1a1a;
  transition: transform 0.2s;
  cursor: pointer;
}

.movie-card:hover {
  transform: scale(1.05);
}

.movie-card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
  background: #222;
}

.quality-badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: #ff4444;
  padding: 3px 6px;
  font-size: 11px;
  font-weight: bold;
  border-radius: 4px;
  color: white;
}

.rating-badge {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #ffc107;
  color: #000;
  padding: 3px 6px;
  font-size: 11px;
  font-weight: bold;
  border-radius: 4px;
}

.movie-title {
  padding: 8px;
  font-size: 13px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.no-movies {
  text-align: center;
  color: #666;
  padding: 50px 0;
  grid-column: 1/-1;
}

/* Mobile 3x3 grid */
@media (max-width: 600px) {
.movie-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
.movie-card img {
    height: 200px;
  }
}

header {
    background: #111;
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 999;
  }

  .logo{
    font-size: 22px;
    font-weight: 700;
    white-space: nowrap;
  }

  .logo span{
    color: #ff2d95;
  }

  .header-right i{
    font-size: 20px;
    margin-left: 20px;
    cursor: pointer;
  }

.search-box {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    background: #0a0a0a;
    padding: 12px 15px;
    display: none;
    z-index: 999;
    border-bottom: 1px solid #222;
    box-sizing: border-box;
  }
  .search-box.active {
    display: flex;
    align-items: center;
  }
  .search-box input {
    flex: 1;
    height: 45px;
    background: #1a1a1a;
    border: none;
    border-radius: 25px;
    padding: 0 45px 0 20px;
    color: white;
    font-size: 16px;
    outline: none;
  }
  .search-box input::placeholder {
    color: #666;
  }
  #closeSearch {
    position: absolute;
    right: 30px;
    font-size: 20px;
    color: #888;
    cursor: pointer;
  }
  #closeSearch:hover {
    color: #ff2d95;
  }
  
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
  <div class="header-right">
    <i class="fa fa-search" id="searchBtn"></i>
    <i class="fa fa-bars" id="menuBtn"></i>
  </div>

  <div class="search-box" id="searchBox">
    <input type="text" placeholder="Search cartoons or movies...">
    <i class="fa fa-times" id="closeSearch"></i>
  </div>
</header>

<!-- Sidebar Menu -->
<div class="sidebar" id="sidebar">
  <span class="close-btn" id="closeSidebar">×</span>
  <ul>
    <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
    <li class="active"><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
    <li><a href="series.html"><i class="fa fa-tv"></i> TV Shows</a></li>
    <li><a href="chanels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
    <li><a href="about.html"><i class="fa fa-info-circle"></i> About</a></li>
    <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
  </ul>
</div>
<div class="overlay" id="overlay"></div>

<h1>🎬 All Movies</h1>

<div class="movie-grid" id="movieGrid">
  <div class="no-movies">Loading movies...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
  authDomain: "magical-movie-land.firebaseapp.com",
  projectId: "magical-movie-land",
  storageBucket: "magical-movie-land.firebasestorage.app",
  messagingSenderId: "27757424288",
  appId: "1:27757424288:web:d650e2659f09f0b9c823c5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const grid = document.getElementById('movieGrid');

// FIX: orderBy අයින් කළා - Index ඕන නෑ දැන්
async function loadMovies() {
  try {
    const q = query(
      collection(db, "movies"),
      where("category", "==", "allmovies"),
      where("type", "==", "movie")
    );
    const snapshot = await getDocs(q);

    if(snapshot.empty) {
      grid.innerHTML = '<div class="no-movies">Movies නැත. Admin එකෙන් "All Movies Page" select කරලා add කරපන්.</div>';
      return;
    }

    grid.innerHTML = "";

    snapshot.forEach(doc => {
      const m = doc.data();
      const poster = m.poster || 'https://via.placeholder.com/300x450/222/fff?text=No+Image';

      let rating = '0.0';
      if(m.imdbRating) {
        rating = m.imdbRating.toString().split('/')[0];
      }

      const card = `
        <div class="movie-card" onclick="openMovie('${doc.id}')">
          <span class="quality-badge">${m.quality || 'WEB-DL'}</span>
          <span class="rating-badge">★ ${rating}</span>
          <img src="${poster}" alt="${m.title}" loading="lazy">
          <div class="movie-title">${m.title || 'Untitled'}</div>
        </div>
      `;
      grid.innerHTML += card;
    });
  } catch(err) {
    console.error(err);
    grid.innerHTML = `<div class="no-movies">Error: ${err.message}</div>`;
  }
}

window.openMovie = function(id) {
  window.location.href = `watch.html?id=${id}`;
}

loadMovies();
</script>

<!-- Menu + Search JS -->
  <script>
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const closeSidebar = document.getElementById('closeSidebar');
  const overlay = document.getElementById('overlay');
  const searchBtn = document.getElementById('searchBtn');
  const searchBox = document.getElementById('searchBox');
  const closeSearch = document.getElementById('closeSearch');

  menuBtn?.addEventListener('click', () => {
    sidebar.classList.add('active');
    overlay.classList.add('active');
  });

  closeSidebar?.addEventListener('click', () => {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
  });

  overlay?.addEventListener('click', () => {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
  });

  searchBtn?.addEventListener('click', () => {
    searchBox.classList.toggle('active');
    if(searchBox.classList.contains('active')) {
      searchBox.querySelector('input').focus();
    }
  });
  closeSearch?.addEventListener('click', () => {
    searchBox.classList.remove('active');
  });
  </script>

</body>
</html>
