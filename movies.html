  <!-- Page Content -->
  
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      font-family: Arial, sans-serif;
      color: white;
      padding: 20px;
    }
    h2 {
      margin-bottom: 20px;
      font-size: 24px;
      }
      
    .movies-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* එක පේළියට 3යි */
  gap: 8px; /* cards අතර space අඩු කරපන් */
  padding: 10px;
}

.movie-card {
  position: relative;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  aspect-ratio: 2/3; /* ← මේක තමයි හරියට උස දෙන්නේ. Cinesubz ratio එක */
  width: 100%;
}

.movie-card img {
  width: 100%;
  height: 100%; /* aspect-ratio එකට ගැලපෙන විදියට */
  object-fit: cover;
  display: block;
}

/* Green quality/episode tag - උඩ වම් */
.quality-tag {
  position: absolute;
  top: 5px;
  left: 5px;
  background: #1e9b4d; /* Cinesubz green */
  color: white;
  padding: 3px 5px;
  font-size: 10px;
  font-weight: bold;
  border-radius: 3px;
}

/* Yellow rating tag - උඩ දකුණ */
.rating-tag {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #f5c518;
  color: black;
  padding: 3px 5px;
  font-size: 10px;
  font-weight: bold;
  border-radius: 3px;
}

/* Movie title - යට */
.movie-title {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 30px 4px 6px 4px;
  font-size: 11px; /* Cinesubz වගේ පොඩි font */
  font-weight: 600;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis; /* "Raakh (2026) T..." වගේ ... දානවා */
}
  </style>
</head>
<body>

  <h2>All Movies</h2>
  
  <div class="movies-grid">
    
    <!-- Movie Card 1 -->
    <div class="movie-card">
      <img src="poster1.jpg" alt="Karuppu">
      <span class="quality-tag">WEB</span>
      <span class="rating-tag">★ 7.2</span>
      <div class="movie-title">Karuppu (2026)</div>
    </div>

    <!-- Movie Card 2 -->
    <div class="movie-card">
      <img src="poster2.jpg" alt="Dridam">
      <span class="quality-tag">WEB-DL</span>
      <span class="rating-tag">★ 7.5</span>
      <div class="movie-title">Dridam (2026)</div>
    </div>

    <!-- Movie Card 3 -->
    <div class="movie-card">
      <img src="poster3.jpg" alt="Blades">
      <span class="quality-tag">BLURAY</span>
      <span class="rating-tag">★ 7.3</span>
      <div class="movie-title">Blades of the G...</div>
    </div>

    <!-- තව cards add කරන්න ඕන නම් මේ block එක copy කරපන් -->
    <div class="movie-card">
      <img src="poster4.jpg" alt="Movie">
      <span class="quality-tag">WEB-DL</span>
      <span class="rating-tag">★ 5.7</span>
      <div class="movie-title">Movie Name (2025)</div>
    </div>

  </div>
  
<script src="script.js"></script>
</body>
</html>
