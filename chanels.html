  <ul>

</div>
  <span class="close-btn" id="closeSidebar">×</span>

  <!-- Content - trending section වගේම design -->
  <section class="trending">

      <a href="https://t.me/yourlink" target="_blank" style="display: inline-block; background: #0088cc; color: #fff; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-size: 16px; font-weight: 600; margin: 10px;">Join Telegram</a>

  <!-- Menu + Search JS - එක පාරක් විතරක් -->
  <script>
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const closeSidebar = document.getElementById('closeSidebar');
  const overlay = document.getElementById('overlay');
  const searchBtn = document.getElementById('searchBtn');
  const searchBox = document.getElementById('searchBox');
  const closeSearch = document.getElementById('closeSearch');

  // Menu open/close
  menuBtn?.addEventListener('click', () => {
    sidebar.classList.add('active');
    overlay.classList.add('active');
  });

  closeSidebar?.addEventListener('click', () => {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
  });

  overlay?.addEventListener('click', () => {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
  });

  // Search open/close
  searchBtn?.addEventListener('click', () => {
    searchBox.classList.toggle('active');
    if(searchBox.classList.contains('active')) {
      searchBox.querySelector('input').focus();
    }
  });
  closeSearch?.addEventListener('click', () => {
    searchBox.classList.remove('active');
  });
  </script>



</body>
