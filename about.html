<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Us - MAGICAL MOVIE LAND</title>
  <link rel="icon" href="https://files.catbox.moe/nstkne.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css?v=25"> <!-- Common CSS -->

  <style>
  /* About page eke witharai tiyena CSS */
  .container { 
    padding: 15px; 
    background: #111;
    margin: 15px;
    border-radius: 6px;
  }
  .page-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 15px 0;
  }
  .page-title::before {
    content: '';
    width: 4px;
    height: 24px;
    background: #ff2d95; /* Pink line */
    border-radius: 2px;
  }
  .about-text { font-size: 15px; line-height: 1.7; color: #ccc; }
  .about-text p { margin-bottom: 15px; }
  .about-text strong { color: #fff; font-weight: 700; }
  </style>
</head>
<body>
  
  <header>
    <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
    <div class="header-right">
      <!-- Search icon eka ain kala -->
      <i class="fa fa-bars" id="menuBtn"></i>
    </div>
  </header>

  <div class="sidebar" id="sidebar">
    <span class="close-btn" id="closeSidebar">×</span>
    <ul>
      <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
      <li><a href="tvshows.html"><i class="fa fa-tv"></i> TV Shows</a></li>
      <li><a href="request.html"><i class="fa fa-plus-circle"></i> Requests</a></li>
      <li><a href="chanels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
      <li class="active"><a href="about.html"><i class="fa fa-info-circle"></i> About</a></li>
      <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
      <li><a href="settings.html"><i class="fa fa-cog"></i> Settings</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>

  <div class="container">
    <h1 class="page-title">About Us</h1>
    <div class="about-text">
      <p>Welcome to <strong>MAGICAL MOVIE LAND</strong>...</p>
    </div>
  </div>

  <script>
  // Menu JS witharai. Search JS ain
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const closeSidebar = document.getElementById('closeSidebar');
  const overlay = document.getElementById('overlay');

  menuBtn.onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
  closeSidebar.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
  overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
  </script>
</body>
