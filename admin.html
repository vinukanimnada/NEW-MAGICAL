<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MAGICAL MOVIE LAND</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            max-width: 650px;
            margin: 30px auto;
            padding: 20px;
        }
        h2 { text-align: center; color: #ff2d95; }
        label{font-size:12px;color:#aaa;margin-bottom:5px;display:block}
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            box-sizing: border-box;
        }
        textarea{resize:vertical;min-height:80px}
        button {
            width: 100%;
            padding: 12px;
            background: #ff2d95;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        button.secondary{background:#00bfff}
       .cancel-btn{background:#555;margin-top:5px}
        #msg { text-align: center; margin-top: 15px; color: #00ff88; min-height: 20px; }
       .movie-list {
            margin-top: 40px;
            border-top: 2px solid #333;
            padding-top: 20px;
        }
       .movie-item {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
       .movie-info { flex: 1; }
       .movie-info h4 { margin: 0 0 5px 0; }
       .movie-info p { margin: 0; font-size: 12px; color: #aaa; }
       .btn-group{display:flex;gap:8px}
       .delete-btn {
            background: #ff4444;
            padding: 8px 15px;
            width: auto;
            font-size: 14px;
            margin: 0;
        }
       .edit-btn {
            background: #ffa500;
            padding: 8px 15px;
            width: auto;
            font-size: 14px;
            margin: 0;
        }
        select#contentType{border:2px solid #ff2d95;margin-bottom:20px;font-weight:bold}
       .badge-hero{background:#ff2d95;color:white;padding:3px 8px;border-radius:4px;font-size:11px;margin-left:8px}

        textarea#descInput{
          width: 100%;
          padding: 10px;
          background: #2a2a2a;
          border: 1px solid #3a3a3a;
          border-radius: 8px;
          color: #fff;
          font-family: inherit;
          font-size: 14px;
          resize: vertical;
        }
       .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        small {
            color: #888;
            font-size: 11px;
            margin-top: -10px;
            display: block;
            margin-bottom: 10px;
        }
        #filterCategory {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>🎬 Add / Edit Movie / TV Show</h2>

    <input type="hidden" id="editId" value="">

    <label>📍 Whera Adding Place?</label>
    <select id="contentType" onchange="toggleFields()">
        <option value="movieCard">Movie Cards</option>
        <option value="heroPoster">Hero Poster</option>
    </select>

    <!-- Movie Card Fields -->
    <div id="movieCardFields">

        <select id="category" onchange="toggleSeasonRating()">
            <option value="latest">Latest Uploads - Home</option>
            <option value="trending">Daily Trending - Home</option>
            <option value="tvshows">TV Shows - Home</option>
            <option value="allmovies">All Movies Page</option>
            <option value="alltvshows">All TV Shows Page</option>
        </select>

        <input type="text" id="title" placeholder="Movie / Series Name">
        <input type="text" id="poster" placeholder="Poster Image URL">
        <input type="text" id="video" placeholder="Video URL - Doodstream Link">
        <input type="text" id="year" placeholder="Year - 2024" value="2024">

        <div id="seasonRatingFields" style="display:none;">
            <div class="row">
                <div>
                    <label>📺 Season Badge</label>
                    <input type="text" id="season" placeholder="S01 COMPLETE / S01 EP01-04">
                    <small>TV Show නම් විතරක්</small>
                </div>
                <div>
                    <label>⭐ Rating</label>
                    <input type="number" step="0.1" min="0" max="10" id="rating" placeholder="8.3">
                    <small>0-10 අතර</small>
                </div>
            </div>
        </div>

        <label>📺 Quality</label>
        <select id="quality">
            <option value="FHD">FHD - Full HD 1080p</option>
            <option value="HD">HD - 720p</option>
            <option value="WEB-DL">WEB-DL</option>
            <option value="CAM">CAM</option>
        </select>

        <label>🎭 Genres</label>
        <input type="text" id="genres" placeholder="ex: Action, Adventure, Fantasy">

        <label>👨‍🎬 Director</label>
        <input type="text" id="director" placeholder="ex: David Yates">

        <label>⏱️ Duration</label>
        <input type="text" id="duration" placeholder="ex: 2h 10m">

        <label>🗣️ Language</label>
        <input type="text" id="language" placeholder="ex: English, Sinhala Dub">

        <label>🌍 Country</label>
        <input type="text" id="country" placeholder="ex: USA, UK">

        <label>⭐ IMDb Rating</label>
        <input type="text" id="imdbRating" placeholder="ex: 8.2/10">

        <label>📊 IMDb Votes</label>
        <input type="text" id="imdbVotes" placeholder="ex: 250K">

        <label>Description</label>
        <textarea id="descInput" placeholder="Movie description..." rows="5"></textarea>
    </div>

    <!-- Hero Poster Fields -->
    <div id="heroFields" style="display: none;">
        <input type="text" id="heroTitle" placeholder="Movie / Series Name">
        <input type="text" id="heroBanner" placeholder="Hero Poster/Banner URL 16:9">
        <input type="text" id="heroImdbRating" placeholder="IMDb Rate - ex: 7.0">
        <input type="text" id="heroYear" placeholder="Released year">
        <textarea id="heroDescription" placeholder="Movie short description"></textarea>
    </div>

    <button onclick="addMovie()" id="saveBtn">Save</button>
    <button onclick="cancelEdit()" class="cancel-btn" id="cancelBtn" style="display:none;">Cancel Edit</button>
    <p id="msg"></p>

    <div class="movie-list">
        <h2>📋 All Content - Edit / Delete Here</h2>

        <select id="filterCategory" onchange="loadMovies()" style="margin-bottom:15px;">
            <option value="all">සියල්ල පෙන්නන්න</option>
            <option value="latest">Latest Uploads - Home</option>
            <option value="trending">Daily Trending - Home</option>
            <option value="tvshows">TV Shows - Home</option>
            <option value="allmovies">All Movies Page</option>
            <option value="alltvshows">All TV Shows Page</option>
            <option value="hero">Hero Posters Only</option>
        </select>

        <div id="movieList">Loading...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, deleteDoc, doc, orderBy, query, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
          authDomain: "magical-movie-land.firebaseapp.com",
          projectId: "magical-movie-land",
          storageBucket: "magical-movie-land.firebasestorage.app",
          messagingSenderId: "27757424288",
          appId: "1:27757424288:web:d650e2659f09f0b9c823c5",
          measurementId: "G-KK84DYV9EP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.onload = function() {
            toggleFields();
            toggleSeasonRating();
            loadMovies();
        }

        window.toggleFields = function() {
            const type = document.getElementById('contentType').value;
            const movieFields = document.getElementById('movieCardFields');
            const heroFields = document.getElementById('heroFields');
            const filterDropdown = document.getElementById('filterCategory');

            if(type === 'heroPoster') {
                movieFields.style.display = 'none';
                heroFields.style.display = 'block';
                if(filterDropdown) {
                    filterDropdown.value = 'hero';
                    loadMovies();
                }
            } else {
                movieFields.style.display = 'block';
                heroFields.style.display = 'none';
                toggleSeasonRating();
                if(filterDropdown) {
                    filterDropdown.value = 'all';
                    loadMovies();
                }
            }
        }

        window.toggleSeasonRating = function() {
            const cat = document.getElementById('category').value;
            const seasonDiv = document.getElementById('seasonRatingFields');
            if(cat === 'tvshows' || cat === 'alltvshows') {
                seasonDiv.style.display = 'block';
            } else {
                seasonDiv.style.display = 'none';
            }
        }

        window.addMovie = async function() {
            const editId = document.getElementById('editId').value;
            const type = document.getElementById('contentType').value;
            const msg = document.getElementById('msg');

            let data = {};

            try {
                if(type === 'heroPoster') {
                    const heroTitle = document.getElementById('heroTitle').value.trim();
                    if(!heroTitle) {
                        msg.style.color = 'red';
                        msg.innerText = '⚠️ Hero Title එක දාපන්!';
                        setTimeout(()=> msg.innerText = '', 2000);
                        return;
                    }

                    data = {
                        title: heroTitle,
                        banner: document.getElementById('heroBanner').value.trim() || null,
                        imdbRating: document.getElementById('heroImdbRating').value.trim() || null,
                        year: document.getElementById('heroYear').value.trim() || null,
                        description: document.getElementById('heroDescription').value.trim() || null,
                        featured: true,
                        type: 'hero',
                        createdAt: serverTimestamp()
                    };
                } else {
                    data = {
                        title: document.getElementById('title').value.trim() || null,
                        poster: document.getElementById('poster').value.trim() || null,
                        video: document.getElementById('video').value.trim() || null,
                        year: document.getElementById('year').value.trim() || null,
                        quality: document.getElementById('quality').value,
                        genres: document.getElementById('genres').value.trim() || null,
                        director: document.getElementById('director').value.trim() || null,
                        duration: document.getElementById('duration').value.trim() || null,
                        language: document.getElementById('language').value.trim() || null,
                        country: document.getElementById('country').value.trim() || null,
                        imdbRating: document.getElementById('imdbRating').value.trim() || null,
                        imdbVotes: document.getElementById('imdbVotes').value.trim() || null,
                        description: document.getElementById('descInput').value.trim() || null,
                        category: document.getElementById('category').value,
                        season: document.getElementById('season').value.trim() || null,
                        rating: parseFloat(document.getElementById('rating').value) || null,
                        featured: false,
                        type: 'movie',
                        createdAt: serverTimestamp()
                    };
                }

                if(editId) {
                    await updateDoc(doc(db, "movies", editId), data);
                    msg.style.color = '#00ff88';
                    msg.innerText = '✅ Updated Successfully!';
                    cancelEdit();
                } else {
                    await addDoc(collection(db, "movies"), data);
                    msg.style.color = '#00ff88';
                    msg.innerText = type === 'heroPoster'? '✅ Hero Poster Saved!' : '✅ Movie Saved!';
                }

                clearForm();
                setTimeout(()=> msg.innerText = '', 2000);
                loadMovies();

            } catch(err) {
                msg.style.color = 'red';
                msg.innerText = 'Error: ' + err.message;
                setTimeout(()=> msg.innerText = '', 3000);
            }
        }

        window.editMovie = async function(id) {
            const docRef = doc(db, "movies", id);
            const docSnap = await getDoc(docRef);

            if(docSnap.exists()) {
                const m = docSnap.data();
                document.getElementById('editId').value = id;

                if(m.type === 'hero' || m.featured === true) {
                    document.getElementById('contentType').value = 'heroPoster';
                    toggleFields();
                    document.getElementById('heroTitle').value = m.title || '';
                    document.getElementById('heroBanner').value = m.banner || '';
                    document.getElementById('heroImdbRating').value = m.imdbRating || '';
                    document.getElementById('heroYear').value = m.year || '';
                    document.getElementById('heroDescription').value = m.description || '';
                } else {
                    document.getElementById('contentType').value = 'movieCard';
                    toggleFields();
                    document.getElementById('title').value = m.title || '';
                    document.getElementById('poster').value = m.poster || '';
                    document.getElementById('video').value = m.video || '';
                    document.getElementById('year').value = m.year || '2024';
                    document.getElementById('quality').value = m.quality || 'FHD';
                    document.getElementById('genres').value = m.genres || '';
                    document.getElementById('director').value = m.director || '';
                    document.getElementById('duration').value = m.duration || '';
                    document.getElementById('language').value = m.language || '';
                    document.getElementById('country').value = m.country || '';
                    document.getElementById('imdbRating').value = m.imdbRating || '';
                    document.getElementById('imdbVotes').value = m.imdbVotes || '';
                    document.getElementById('descInput').value = m.description || '';
                    document.getElementById('category').value = m.category || 'latest';
                    document.getElementById('season').value = m.season || '';
                    document.getElementById('rating').value = m.rating || '';
                    toggleSeasonRating();
                }

                document.getElementById('saveBtn').innerText = 'Update Movie';
                document.getElementById('cancelBtn').style.display = 'block';
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        }

        window.cancelEdit = function() {
            document.getElementById('editId').value = '';
            document.getElementById('saveBtn').innerText = 'Save';
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('contentType').value = 'movieCard';
            toggleFields();
            clearForm();
        }

        function clearForm() {
            document.querySelectorAll('#movieCardFields input[type="text"]').forEach(input => input.value = '');
            document.getElementById('year').value = '2024';
            document.getElementById('quality').value = 'FHD';
            document.getElementById('descInput').value = '';
            document.getElementById('season').value = '';
            document.getElementById('rating').value = '';
            document.querySelectorAll('#heroFields input, #heroFields textarea').forEach(input => input.value = '');
        }

        // FIX: window.loadMovies කරා - මෙතන තමයි magic එක
        window.loadMovies = async function() {
            const movieList = document.getElementById('movieList');
            const filterDropdown = document.getElementById('filterCategory');
            const filterValue = filterDropdown? filterDropdown.value : 'all';

            const q = query(collection(db, "movies"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);

            if(snapshot.empty) {
                movieList.innerHTML = '<p style="text-align:center; color:#666;">Movies නැත</p>';
                return;
            }

            let html = '';
            snapshot.forEach(docSnap => {
                const m = docSnap.data();
                const isHero = m.featured === true || m.type === 'hero';
                const badgeInfo = m.season? ` | ${m.season}` : '';
                const ratingInfo = m.rating? ` | ★${m.rating}` : '';

                let showItem = false;

                if(filterValue === 'all') {
                    showItem = true;
                } else if(filterValue === 'hero') {
                    showItem = isHero;
                } else {
                    showItem = m.category === filterValue;
                }

                if(showItem) {
                    html += `
                        <div class="movie-item">
                            <div class="movie-info">
                                <h4>${m.title || '⚠️ No Title'} ${isHero? '<span class="badge-hero">HERO</span>' : ''}</h4>
                                <p>${isHero? 'Hero Banner' : 'Quality: ' + (m.quality || 'N/A') + badgeInfo + ratingInfo} | Year: ${m.year || 'N/A'} | Cat: ${m.category || 'N/A'}</p>
                            </div>
                            <div class="btn-group">
                                <button class="edit-btn" onclick="editMovie('${docSnap.id}')">Edit</button>
                                <button class="delete-btn" onclick="deleteMovie('${docSnap.id}', '${m.title || 'Movie'}')">Delete</button>
                            </div>
                        </div>
                    `;
                }
            });

            if(html === '') {
                const filterText = filterDropdown? filterDropdown.selectedOptions[0].text : 'මේ';
                movieList.innerHTML = `<p style="text-align:center; color:#666;">"${filterText}" category එකේ items නැත</p>`;
            } else {
                movieList.innerHTML = html;
            }
        }

        window.deleteMovie = async function(id, title) {
            if(confirm(`"${title}" delete කරන්නද?`)) {
                await deleteDoc(doc(db, "movies", id));
                alert('✅ Deleted!');
                loadMovies();
            }
        }
    </script>
</body>
</html>
