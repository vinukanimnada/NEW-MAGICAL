<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MAG Movies</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h2 {
            color: #ff2d95;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-section {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .form-section h3 {
            color: #ff2d95;
            margin-top: 0;
            margin-bottom: 20px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ff2d95;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ff2d95;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: #e02580;
        }
        button.secondary {
            background: #555;
            margin-top: 10px;
        }
        button.secondary:hover {
            background: #666;
        }
        #msg {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }
        .success {
            background: #2d5a2d;
            color: #4caf50;
            border: 1px solid #4caf50;
        }
        .error {
            background: #5a2d2d;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        .movie-item {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }
        .movie-info h4 {
            margin: 0 0 5px 0;
            color: #ff2d95;
        }
        .movie-info p {
            margin: 0;
            font-size: 13px;
            color: #aaa;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .edit-btn {
            background: #ffa500;
            padding: 8px 15px;
            font-size: 13px;
            width: auto;
        }
        .delete-btn {
            background: #ff4444;
            padding: 8px 15px;
            font-size: 13px;
            width: auto;
        }
        label {
            font-size: 13px;
            color: #aaa;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎬 Admin Panel - MAG Movies</h2>
        
        <!-- Movie Form -->
        <div class="form-section">
            <h3 id="formTitle">Add New Movie</h3>
            <input type="hidden" id="editId">
            
            <label>Movie Title *</label>
            <input type="text" id="title" placeholder="Enter movie title" required>
            
            <label>Poster Image URL *</label>
            <input type="text" id="poster" placeholder="https://example.com/poster.jpg" required>
            
            <label>Video URL</label>
            <input type="text" id="video" placeholder="https://youtube.com/watch?v=... or .mp4 link">
            
            <label>Year</label>
            <input type="text" id="year" placeholder="2024">
            
            <label>Genre</label>
            <input type="text" id="genre" placeholder="Action, Drama, Comedy">
            
            <label>IMDb Rating</label>
            <input type="text" id="imdb" placeholder="8.5/10">
            
            <label>Description</label>
            <textarea id="description" rows="3" placeholder="Movie description..."></textarea>
            
            <label>Category</label>
            <select id="category">
                <option value="latest">Latest Uploads</option>
                <option value="trending">Trending Now</option>
                <option value="all">All Movies</option>
            </select>
            
            <button onclick="addMovie()" id="saveBtn">Save Movie</button>
            <button onclick="cancelEdit()" class="secondary" id="cancelBtn" style="display:none;">Cancel Edit</button>
            <div id="msg"></div>
        </div>

        <!-- Hero Banner Form -->
        <div class="form-section">
            <h3>🎯 Hero Banner - Featured Movie</h3>
            
            <label>Movie Title *</label>
            <input type="text" id="heroTitle" placeholder="Featured movie title" required>
            
            <label>Banner Image URL * 16:9 Ratio</label>
            <input type="text" id="heroBanner" placeholder="https://example.com/banner.jpg" required>
            
            <label>IMDb Rating</label>
            <input type="text" id="heroImdb" placeholder="8.5/10">
            
            <label>Year</label>
            <input type="text" id="heroYear" placeholder="2024">
            
            <label>Description</label>
            <textarea id="heroDesc" rows="3" placeholder="Featured movie description..."></textarea>
            
            <button onclick="addHeroBanner()">Save Hero Banner</button>
            <div id="heroMsg"></div>
        </div>

        <!-- Movie List -->
        <div class="form-section">
            <h3>📋 All Movies</h3>
            <div id="movieList">Loading...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCx0X0X0X0X0X0X0X0X0X0X0X0X0X0X0X0",
          authDomain: "mag-movies.firebaseapp.com",
          projectId: "mag-movies",
          storageBucket: "mag-movies.appspot.com",
          messagingSenderId: "123456789",
          appId: "1:123456789:web:abc123def456"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Show message function
        function showMsg(elementId, message, type) {
            const msgDiv = document.getElementById(elementId);
            msgDiv.className = type;
            msgDiv.innerText = message;
            msgDiv.style.display = 'block';
            setTimeout(() => msgDiv.style.display = 'none', 3000);
        }

        // Add/Update Movie
        window.addMovie = async function() {
            const id = document.getElementById('editId').value;
            const title = document.getElementById('title').value.trim();
            const poster = document.getElementById('poster').value.trim();
            
            if(!title || !poster) {
                showMsg('msg', 'Title and Poster URL are required!', 'error');
                return;
            }

            const data = {
                title: title,
                poster: poster,
                video: document.getElementById('video').value.trim(),
                year: document.getElementById('year').value.trim(),
                genre: document.getElementById('genre').value.trim(),
                imdb: document.getElementById('imdb').value.trim(),
                description: document.getElementById('description').value.trim(),
                category: document.getElementById('category').value,
                featured: false,
                createdAt: new Date()
            };

            try {
                if(id) {
                    await updateDoc(doc(db, "movies", id), data);
                    showMsg('msg', 'Movie updated successfully!', 'success');
                    cancelEdit();
                } else {
                    await addDoc(collection(db, "movies"), data);
                    showMsg('msg', 'Movie added successfully!', 'success');
                }
                clearForm();
                loadMovies();
            } catch(e) {
                showMsg('msg', 'Error: ' + e.message, 'error');
            }
        }

        // Add Hero Banner
        window.addHeroBanner = async function() {
            const title = document.getElementById('heroTitle').value.trim();
            const banner = document.getElementById('heroBanner').value.trim();
            
            if(!title || !banner) {
                showMsg('heroMsg', 'Title and Banner URL are required!', 'error');
                return;
            }

            const data = {
                title: title,
                banner: banner,
                imdb: document.getElementById('heroImdb').value.trim(),
                year: document.getElementById('heroYear').value.trim(),
                description: document.getElementById('heroDesc').value.trim(),
                featured: true,
                createdAt: new Date()
            };

            try {
                await addDoc(collection(db, "movies"), data);
                showMsg('heroMsg', 'Hero banner added successfully!', 'success');
                clearHeroForm();
                loadMovies();
            } catch(e) {
                showMsg('heroMsg', 'Error: ' + e.message, 'error');
            }
        }

        // Clear form
        function clearForm() {
            document.getElementById('editId').value = '';
            document.getElementById('title').value = '';
            document.getElementById('poster').value = '';
            document.getElementById('video').value = '';
            document.getElementById('year').value = '';
            document.getElementById('genre').value = '';
            document.getElementById('imdb').value = '';
            document.getElementById('description').value = '';
            document.getElementById('category').value = 'latest';
            document.getElementById('formTitle').innerText = 'Add New Movie';
            document.getElementById('saveBtn').innerText = 'Save Movie';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        // Clear hero form
        function clearHeroForm() {
            document.getElementById('heroTitle').value = '';
            document.getElementById('heroBanner').value = '';
            document.getElementById('heroImdb').value = '';
            document.getElementById('heroYear').value = '';
            document.getElementById('heroDesc').value = '';
        }

        // Cancel edit
        window.cancelEdit = function() {
            clearForm();
        }

        // Edit movie
        window.editMovie = function(id, data) {
            document.getElementById('editId').value = id;
            document.getElementById('title').value = data.title || '';
            document.getElementById('poster').value = data.poster || '';
            document.getElementById('video').value = data.video || '';
            document.getElementById('year').value = data.year || '';
            document.getElementById('genre').value = data.genre || '';
            document.getElementById('imdb').value = data.imdb || '';
            document.getElementById('description').value = data.description || '';
            document.getElementById('category').value = data.category || 'latest';
            document.getElementById('formTitle').innerText = 'Edit Movie';
            document.getElementById('saveBtn').innerText = 'Update Movie';
            document.getElementById('cancelBtn').style.display = 'block';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Delete movie
        window.deleteMovie = async function(id) {
            if(confirm('Delete this movie?')) {
                try {
                    await deleteDoc(doc(db, "movies", id));
                    showMsg('msg', 'Movie deleted!', 'success');
                    loadMovies();
                } catch(e) {
                    showMsg('msg', 'Error: ' + e.message, 'error');
                }
            }
        }

        // Load movies
        async function loadMovies() {
            const movieList = document.getElementById('movieList');
            movieList.innerHTML = 'Loading...';
            
            try {
                const q = query(collection(db, "movies"), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                
                if(snapshot.empty) {
                    movieList.innerHTML = '<p style="text-align:center;color:#666;">No movies found</p>';
                    return;
                }

                let html = '';
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const type = data.featured ? '🎯 Hero Banner' : '🎬 ' + (data.category || 'Movie');
                    html += `
                        <div class="movie-item">
                            <div class="movie-info">
                                <h4>${data.title || 'No Title'}</h4>
                                <p>${type} | Year: ${data.year || 'N/A'} | IMDb: ${data.imdb || 'N/A'}</p>
                            </div>
                            <div class="btn-group">
                                <button class="edit-btn" onclick='editMovie("${docSnap.id}", ${JSON.stringify(data).replace(/"/g, '&quot;')})'>Edit</button>
                                <button class="delete-btn" onclick="deleteMovie('${docSnap.id}')">Delete</button>
                            </div>
                        </div>
                    `;
                });
                movieList.innerHTML = html;
            } catch(e) {
                movieList.innerHTML = '<p style="text-align:center;color:#ff4444;">Error loading movies: ' + e.message + '</p>';
            }
        }

        loadMovies();
    </script>
</body>
</html>
