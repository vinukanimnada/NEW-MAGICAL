<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MAGICAL MOVIE LAND</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff2d95;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <h2>🎬 Add Movie</h2>

    <input type="text" id="title" placeholder="movie name">

    <input type="text" id="poster" placeholder="img.url">

    <input type="text" id="video" placeholder="video.url">

    <button onclick="addMovie()">Save Movie</button>

    <script type="module" src="script.js"></script>

</body>
</html>
