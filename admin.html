<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MAGICAL MOVIE LAND</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
        }
        h2 { text-align: center; color: #ff2d95; }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #ff2d95;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        #msg { text-align: center; margin-top: 15px; color: #00ff88; min-height: 20px; }
       .movie-list {
            margin-top: 40px;
            border-top: 2px solid #333;
            padding-top: 20px;
        }
       .movie-item {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
       .movie-info { flex: 1; }
       .movie-info h4 { margin: 0 0 5px 0; }
       .movie-info p { margin: 0; font-size: 12px; color: #aaa; }
       .delete-btn {
            background: #ff4444;
            padding: 8px 15px;
            width: auto;
            font-size: 14px;
            margin: 0;
        }
        label{font-size:12px;color:#aaa;margin-bottom:5px;display:block}
    </style>
</head>
<body>

    <h2>🎬 Add Movie / TV Show</h2>

    <input type="text" id="title" placeholder="Movie / Series Name">
    <input type="text" id="poster" placeholder="Poster Image URL">
    <input type="text" id="video" placeholder="Video URL - Doodstream Link">
    <input type="text" id="year" placeholder="Year - 2024" value="2024">

    <!-- Quality Select - අලුතෙන් -->
    <label>📺 Quality</label>
    <select id="quality">
        <option value="FHD">FHD - Full HD 1080p</option>
        <option value="HD">HD - 720p</option>
        <option value="WEB-DL">WEB-DL</option>
        <option value="CAM">CAM</option>
    </select>

    <label>🎭 Genres</label>
    <input type="text" id="genres" placeholder="ex: Action, Adventure, Fantasy">
    
    <label>👨‍🎬 Director</label>
    <input type="text" id="director" placeholder="ex: David Yates">
    
    <label>⏱️ Duration</label>
    <input type="text" id="duration" placeholder="ex: 2h 10m">
    
    <label>🗣️ Language</label>
    <input type="text" id="language" placeholder="ex: English, Sinhala Dub">
    
    <label>🌍 Country</label>
    <input type="text" id="country" placeholder="ex: USA, UK">

    <label>⭐ IMDb Rating</label>
    <input type="text" id="imdbRating" placeholder="ex: 8.2/10">
    
    <label>📊 IMDb Votes</label>
    <input type="text" id="imdbVotes" placeholder="ex: 250K">

    <select id="category">
        <option value="latest">Latest Uploads - Home</option>
        <option value="trending">Daily Trending - Home</option>
        <option value="tvshows">TV Shows - Home</option>
        <option value="allmovies">All Movies Page</option>
        <option value="alltvshows">All TV Shows Page</option>
    </select>

    <button onclick="addMovie()">Save</button>
    <p id="msg"></p>

    <div class="movie-list">
        <h2>📋 All Content - Delete Here</h2>
        <div id="movieList">Loading...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
          authDomain: "magical-movie-land.firebaseapp.com",
          projectId: "magical-movie-land",
          storageBucket: "magical-movie-land.firebasestorage.app",
          messagingSenderId: "27757424288",
          appId: "1:27757424288:web:d650e2659f09f0b9c823c5",
          measurementId: "G-KK84DYV9EP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 100% Optional Save - Validation නෑ
        window.addMovie = async function() {
            const title = document.getElementById('title').value.trim();
            const poster = document.getElementById('poster').value.trim();
            const video = document.getElementById('video').value.trim();
            const year = document.getElementById('year').value.trim();
            const quality = document.getElementById('quality').value;
            const genres = document.getElementById('genres').value.trim();
            const director = document.getElementById('director').value.trim();
            const duration = document.getElementById('duration').value.trim();
            const language = document.getElementById('language').value.trim();
            const country = document.getElementById('country').value.trim();
            const imdbRating = document.getElementById('imdbRating').value.trim();
            const imdbVotes = document.getElementById('imdbVotes').value.trim();
            const category = document.getElementById('category').value;
            const msg = document.getElementById('msg');

            try {
                await addDoc(collection(db, "movies"), {
                    title: title || null,
                    poster: poster || null,
                    video: video || null,
                    year: year || null,
                    quality: quality || null,
                    genres: genres || null,
                    director: director || null,
                    duration: duration || null,
                    language: language || null,
                    country: country || null,
                    imdbRating: imdbRating || null,
                    imdbVotes: imdbVotes || null,
                    category: category,
                    createdAt: serverTimestamp()
                });

                msg.style.color = '#00ff88';
                msg.innerText = '✅ Movie Saved!';
                
                // Clear කරන්න
                document.querySelectorAll('input[type="text"]').forEach(input => input.value = '');
                document.getElementById('year').value = '2024';
                document.getElementById('quality').value = 'FHD';
                
                setTimeout(()=> msg.innerText = '', 2000);
                loadMovies();

            } catch(err) {
                msg.style.color = 'red';
                msg.innerText = 'Error: ' + err.message;
                setTimeout(()=> msg.innerText = '', 3000);
            }
        }

        async function loadMovies() {
            const movieList = document.getElementById('movieList');
            const q = query(collection(db, "movies"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);

            if(snapshot.empty) {
                movieList.innerHTML = '<p style="text-align:center; color:#666;">Movies නැත</p>';
                return;
            }

            let html = '';
            snapshot.forEach(docSnap => {
                const m = docSnap.data();
                html += `
                    <div class="movie-item">
                        <div class="movie-info">
                            <h4>${m.title || 'Untitled'}</h4>
                            <p>Quality: ${m.quality || 'N/A'} | Year: ${m.year || 'N/A'} | IMDb: ${m.imdbRating || 'N/A'}</p>
                        </div>
                        <button class="delete-btn" onclick="deleteMovie('${docSnap.id}', '${m.title || 'Movie'}')">Delete</button>
                    </div>
                `;
            });
            movieList.innerHTML = html;
        }

        window.deleteMovie = async function(id, title) {
            if(confirm(`"${title}" delete කරන්නද?`)) {
                await deleteDoc(doc(db, "movies", id));
                alert('✅ Deleted!');
                loadMovies();
            }
        }

        loadMovies();
    </script>
</body>
</html>
