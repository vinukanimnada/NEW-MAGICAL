<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Movies - MAGICAL MOVIE LAND</title>
<style>
body {
  background: #0e0e0e;
  color: #fff;
  font-family: Arial;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #ff2d95;
  margin-bottom: 30px;
}

.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
}

.movie-card {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: #1a1a1a;
  transition: transform 0.2s;
  cursor: pointer;
}

.movie-card:hover {
  transform: scale(1.05);
}

.movie-card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
  background: #222;
}

.quality-badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: #ff4444;
  padding: 3px 6px;
  font-size: 11px;
  font-weight: bold;
  border-radius: 4px;
  color: white;
}

.rating-badge {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #ffc107;
  color: #000;
  padding: 3px 6px;
  font-size: 11px;
  font-weight: bold;
  border-radius: 4px;
}

.movie-title {
  padding: 8px;
  font-size: 13px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Mobile වලට 3x3 grid */
@media (max-width: 600px) {
 .movie-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
 .movie-card img {
    height: 200px;
  }
}

.no-movies {
  text-align: center;
  color: #666;
  padding: 50px 0;
}
</style>
</head>
<body>

<h1>🎬 All Movies</h1>

<div class="movie-grid" id="movieGrid">
  <div class="no-movies">Loading movies...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, orderBy, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
  authDomain: "magical-movie-land.firebaseapp.com",
  projectId: "magical-movie-land",
  storageBucket: "magical-movie-land.firebasestorage.app",
  messagingSenderId: "27757424288",
  appId: "1:27757424288:web:d650e2659f09f0b9c823c5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const grid = document.getElementById('movieGrid');

// All Movies Page එකට විතරක් movies load කරනවා
async function loadMovies() {
  try {
    const q = query(
      collection(db, "movies"),
      where("category", "==", "allmovies"), // admin එකේ value එක
      orderBy("createdAt", "desc")
    );
    const snapshot = await getDocs(q);

    if(snapshot.empty) {
      grid.innerHTML = '<div class="no-movies">Movies නැත. Admin එකෙන් add කරපන්.</div>';
      return;
    }

    grid.innerHTML = "";

    snapshot.forEach(doc => {
      const m = doc.data();

      // admin එකේ poster field එක use කරනවා
      const poster = m.poster || m.image || 'https://via.placeholder.com/300x450/222/fff?text=No+Image';

      // rating: imdbRating නම් 8.2/10 වගේ, number නම් 8.2 වගේ
      let rating = '0.0';
      if(m.imdbRating) {
        rating = m.imdbRating.toString().split('/')[0]; // 8.2/10 → 8.2
      } else if(m.rating) {
        rating = m.rating;
      }

      const card = `
        <div class="movie-card" onclick="openMovie('${doc.id}')">
          <span class="quality-badge">${m.quality || 'WEB-DL'}</span>
          <span class="rating-badge">★ ${rating}</span>
          <img src="${poster}" alt="${m.title}" loading="lazy">
          <div class="movie-title">${m.title || 'Untitled'}</div>
        </div>
      `;
      grid.innerHTML += card;
    });
  } catch(err) {
    grid.innerHTML = `<div class="no-movies">Error: ${err.message}</div>`;
    console.error(err);
  }
}

window.openMovie = function(id) {
  window.location.href = `watch.html?id=${id}`;
}

loadMovies();
</script>
</body>
</html>
