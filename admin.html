<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MAGICAL MOVIE LAND</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
        }
        h2 { text-align: center; color: #ff2d95; }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #ff2d95;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        #msg { text-align: center; margin-top: 15px; color: #00ff88; }
       .movie-list {
            margin-top: 40px;
            border-top: 2px solid #333;
            padding-top: 20px;
        }
       .movie-item {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
       .movie-info { flex: 1; }
       .movie-info h4 { margin: 0 0 5px 0; }
       .movie-info p { margin: 0; font-size: 12px; color: #aaa; }
       .delete-btn {
            background: #ff4444;
            padding: 8px 15px;
            width: auto;
            font-size: 14px;
            margin: 0;
        }
        label{font-size:12px;color:#aaa;margin-bottom:5px;display:block}
    </style>
</head>
<body>

    <h2>🎬 Add Movie / TV Show</h2>

    <input type="text" id="title" placeholder="Movie / Series Name" required>
    <input type="text" id="poster" placeholder="Poster Image URL" required>
    <input type="text" id="video" placeholder="Video URL" required>
    <input type="text" id="year" placeholder="Year - 2024" value="2024">

    <!-- IMDb Fields අලුතෙන් add කලේ මේක -->
    <label>IMDb Rating</label>
    <input type="text" id="imdbRating" placeholder="ex: 8.2/10">
    
    <label>IMDb Votes</label>
    <input type="text" id="imdbVotes" placeholder="ex: 250K">

    <select id="category">
        <option value="latest">Latest Uploads - Home</option>
        <option value="trending">Daily Trending - Home</option>
        <option value="tvshows">TV Shows - Home</option>
        <option value="allmovies">All Movies Page</option>
        <option value="alltvshows">All TV Shows Page</option>
    </select>

    <button onclick="addMovie()">Save</button>
    <p id="msg"></p>

    <div class="movie-list">
        <h2>📋 All Content - Delete Here</h2>
        <div id="movieList">Loading...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
          authDomain: "magical-movie-land.firebaseapp.com",
          projectId: "magical-movie-land",
          storageBucket: "magical-movie-land.firebasestorage.app",
          messagingSenderId: "27757424288",
          appId: "1:27757424288:web:d650e2659f09f0b9c823c5",
          measurementId: "G-KK84DYV9EP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.addMovie = async function() {
            const title = document.getElementById('title').value;
            const poster = document.getElementById('poster').value;
            const video = document.getElementById('video').value;
            const year = document.getElementById('year').value;
            const imdbRating = document.getElementById('imdbRating').value;
            const imdbVotes = document.getElementById('imdbVotes').value;
            const category = document.getElementById('category').value;
            const msg = document.getElementById('msg');

            if(!title ||!poster ||!video) {
                msg.style.color = 'red';
                msg.innerText = 'සියලුම fields පුරවන්න!';
                return;
            }

            try {
                await addDoc(collection(db, "movies"), {
                    title: title,
                    poster: poster,
                    video: video,
                    year: year,
                    imdbRating: imdbRating,  // Firebase එකට save වෙනවා
                    imdbVotes: imdbVotes,    // Firebase එකට save වෙනවා
                    category: category,
                    createdAt: serverTimestamp()
                });

                msg.style.color = '#00ff88';
                msg.innerText = '✅ Saved Movie!';
                document.getElementById('title').value = '';
                document.getElementById('poster').value = '';
                document.getElementById('video').value = '';
                document.getElementById('imdbRating').value = '';
                document.getElementById('imdbVotes').value = '';
                loadMovies();

            } catch(err) {
                msg.style.color = 'red';
                msg.innerText = 'Error: ' + err.message;
            }
        }

        async function loadMovies() {
            const movieList = document.getElementById('movieList');
            const q = query(collection(db, "movies"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);

            if(snapshot.empty) {
                movieList.innerHTML = '<p style="text-align:center; color:#666;">Movies නැත</p>';
                return;
            }

            let html = '';
            snapshot.forEach(docSnap => {
                const m = docSnap.data();
                html += `
                    <div class="movie-item">
                        <div class="movie-info">
                            <h4>${m.title}</h4>
                            <p>Year: ${m.year} | IMDb: ${m.imdbRating || 'N/A'} | Category: ${m.category}</p>
                        </div>
                        <button class="delete-btn" onclick="deleteMovie('${docSnap.id}', '${m.title}')">Delete</button>
                    </div>
                `;
            });
            movieList.innerHTML = html;
        }

        window.deleteMovie = async function(id, title) {
            if(confirm(`"${title}" delete කරන්නද?`)) {
                await deleteDoc(doc(db, "movies", id));
                alert('✅ Deleted Movie!');
                loadMovies();
            }
        }

        loadMovies();
    </script>
</body>
</html>
