<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title id="pageTitle">Watch - MAGICAL MOVIE LAND</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
html, body{background:#000;color:white;font-family:Arial;margin:0;padding:0;overflow:hidden;height:100%} /* FIX 1: scroll ain, full black */

/* ===== FIX 1: OKKOMA HIDE ===== */
header, .info, .description-section, .sidebar, .overlay{display:none !important;} 

/* ===== FIX 2: PLAYER FULL SCREEN ===== */
.player{width:100vw;height:100vh;background:#000;position:fixed;top:0;left:0;z-index:9999;margin:0}
.player iframe{width:100%;height:100%;object-fit:contain;background:#000;display:block;border:0}

/* ========== Thiyena CSS Okkoma Ain Karanna Puluwan ========== */
.info, .movie-detail, .left-col, .right-col, .badges, .details-list, .description-section, .sidebar {display:none}
</style>
</head>
<body>
  
  <!-- Me Okkoma Auto Hide Wei CSS Nisa -->
  <header>
    <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></div>
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
      <i class="fa fa-bars" id="menuBtn"></i>
    </div>
    <div class="search-box" id="searchBox">
      <input type="text" placeholder="Search cartoons or movies...">
      <i class="fa fa-times" id="closeSearch"></i>
    </div>
  </header>

  <div class="sidebar" id="sidebar">
  <span class="close-btn" id="closeSidebar">×</span>
  <ul>
    <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
    <li><a href="movies.html"><i class="fa fa-film"></i> All Movies</a></li>
    <li><a href="series.html"><i class="fa fa-tv"></i> TV Shows</a></li>
    <li><a href="channels.html"><i class="fa-solid fa-users"></i> Join Channels</a></li>
    <li><a href="about.html"><i class="fa fa-info-circle"></i> About Us</a></li>
    <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact Us</a></li>
  </ul>
</div>
  <div class="overlay" id="overlay"></div>
  
<!-- Video Player - IFRAME -->
<div class="player" id="playerBox">
  <!-- FIX 3: sandbox add kala = Ad Block -->
  <iframe id="videoPlayer" src="" 
  sandbox="allow-scripts allow-same-origin allow-presentation allow-forms" 
  style="width:100%; height:100%; border:none; background:#000;" 
  allow="autoplay; fullscreen; encrypted-media" 
  allowfullscreen referrerpolicy="no-referrer"></iframe>
</div>

<div class="info">
  <div class="movie-detail">
    <div class="left-col">
      <img id="poster" src="" alt="">
      <h1 id="movieTitle"></h1>
    </div>
    <div class="right-col">
      <div class="badges" id="badges"></div>
      <div class="details-list">
        <p><strong>🎭 Genres:</strong> <span id="genres"></span></p>
        <p><strong>👨‍💼 Director:</strong> <span id="director"></span></p>
        <p><strong>⏱️ Duration:</strong> <span id="duration"></span></p>
        <p><strong>🗣️ Language:</strong> <span id="language"></span></p>
        <p><strong>🌍 Country:</strong> <span id="country"></span></p>
        <p><strong>📅 Release Year:</strong> <span id="year"></span></p>
        <p><strong>⭐ IMDb Rating:</strong> <span class="imdb-box">⭐ <span id="imdb"></span> <small id="imdbVotes"></small></span></p>
      </div>
    </div>
  </div>
</div>

<div class="description-section">
  <h2 class="desc-title">Description</h2>
  <p class="desc-text" id="movieDesc">Loading description...</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
  authDomain: "magical-movie-land.firebaseapp.com",
  projectId: "magical-movie-land",
  storageBucket: "magical-movie-land.firebasestorage.app",
  messagingSenderId: "27757424288",
  appId: "1:27757424288:web:d650e2659f09f0b9c823c5",
  measurementId: "G-KK84DYV9EP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const params = new URLSearchParams(window.location.search);
const movieId = params.get('id');

async function loadMovie() {
  if(!movieId) {
    document.getElementById('playerBox').innerHTML = '<div style="color:#ff4444;text-align:center;padding-top:40vh;">Movie ID එකක් නෑ</div>';
    return;
  }
  
  const docRef = doc(db, "movies", movieId);
  const docSnap = await getDoc(docRef);
  
  if(docSnap.exists()) {
    const m = docSnap.data();
    document.getElementById('pageTitle').innerText = (m.title || 'Movie') + ' - MAGICAL MOVIE LAND';
    
    // JS eke thiyena de okkoma run wei, e unath CSS nisa penne na
    const videoPlayer = document.getElementById('videoPlayer');
    if(m.video && m.video.includes('/e/')) {
        videoPlayer.src = m.video; 
    } else {
        document.getElementById('playerBox').innerHTML = '<div style="text-align:center; padding-top:40vh; color:#ffaa00;">Hari Streamtape /e/ link ekak nathi</div>';
    }
    
  } else {
    document.getElementById('playerBox').innerHTML = '<div style="text-align:center; padding-top:40vh; color:#ff4444;">Movie එක හොයාගන්න බැරි වුනා</div>';
  }
}
loadMovie();

// Thiyena JS Okkoma Thiyaganna Puluwan. Wada karanne Na CSS Nisa.
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const closeSidebar = document.getElementById('closeSidebar');
const overlay = document.getElementById('overlay');
const searchBtn = document.getElementById('searchBtn');
const searchBox = document.getElementById('searchBox');
const closeSearch = document.getElementById('closeSearch');

menuBtn?.addEventListener('click', () => {sidebar.classList.add('active'); overlay.classList.add('active');});
closeSidebar?.addEventListener('click', () => {sidebar.classList.remove('active'); overlay.classList.remove('active');});
overlay?.addEventListener('click', () => {sidebar.classList.remove('active'); overlay.classList.remove('active');});
searchBtn?.addEventListener('click', () => {searchBox.classList.toggle('active'); if(searchBox.classList.contains('active')){searchBox.querySelector('input').focus();}});
closeSearch?.addEventListener('click', () => {searchBox.classList.remove('active');});

const currentPage = window.location.pathname.split('/').pop() || 'index.html';
document.querySelectorAll('.sidebar ul li a').forEach(link => {if(link.getAttribute('href') === currentPage){link.classList.add('active');}});
</script>
</body>
</html>
