<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch - MAGICAL MOVIE LAND</title>

  <link rel="icon" href="https://files.catbox.moe/nstkne.png" type="image/png">
  <link rel="apple-touch-icon" href="https://files.catbox.moe/nstkne.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">

  <!-- MKV/M3U8 fallback walata HLS.js add kale -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>

  <script>
  (function(){
    const theme = localStorage.getItem('theme') || 'dark';
    document.documentElement.className = theme;
  })();
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  html.dark { --bg: #0a0a0a; --bg-alt: #111; --card: #1a1a1a; --card-2: #222; --text: #fff; --text-dim: #aaa; --text-faint: #666; --border: #222; }
  html.light { --bg: #f4f4f4; --bg-alt: #ffffff; --card: #f5f5f5; --card-2: #e8e8e8; --text: #111; --text-dim: #444; --text-faint: #888; --border: #ddd; }
  body { overflow-x: hidden; background: var(--bg); color: var(--text); }
  a { text-decoration: none; color: inherit; }
  img { display: block; }
 .btn { display: inline-flex; align-items: center; gap: 8px; border: none; border-radius: 6px; padding: 12px 22px; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.15s, opacity 0.15s; }
 .btn:active { transform: scale(0.97); }
 .btn-primary { background: #ff2d95; color: #fff; }
 .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); }
 .btn-outline { background: transparent; border: 1px solid var(--text-faint); color: var(--text); }
 .btn:disabled { opacity: 0.5; cursor: not-allowed; }
 .btn-back { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid #4dc3ff; }
 .btn-back i { color: #4dc3ff; }
 .footer { text-align: center; padding: 30px 20px; border-top: 1px solid var(--border); margin-top: 20px; }
 .footer-logo { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
 .footer-logo span { color: #ff2d95; }
 .footer-text { color: var(--text-dim); font-size: 13px; max-width: 480px; margin: 0 auto 16px; line-height: 1.6; }
 .social-icons { display: flex; justify-content: center; gap: 18px; }
 .social-icons a { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: var(--card); border-radius: 50%; color: var(--text-dim); font-size: 16px; }
 .social-icons a:hover { color: #ff2d95; }
 .details-hero { position: relative; width: 100%; min-height: 230px; background-size: cover; background-repeat: no-repeat; background-position: center center; background-color: #000; display: flex; align-items: flex-end; padding: 20px 15px; }
 .details-hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 5%, rgba(10,10,10,0.55) 55%, rgba(10,10,10,0.35)); }
 .details-hero-inner { position: relative; z-index: 2; display: flex; gap: 16px; align-items: flex-end; width: 100%; }
 .details-poster { width: 110px; height: 160px; border-radius: 8px; object-fit: cover; flex-shrink: 0; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.15); }
 .details-title-block { flex: 1; min-width: 0; }
 .details-title { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.25; margin-bottom: 6px; text-shadow: 0 2px 6px rgba(0,0,0,0.6); }
 .details-meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12.5px; color: #ddd; margin-bottom: 4px; }
 .details-meta span { background: rgba(255,255,255,0.12); padding: 3px 9px; border-radius: 20px; backdrop-filter: blur(2px); }
 .details-meta.rating { background: rgba(255,45,149,0.25); color: #ff9dc7; font-weight: 700; }
 .details-body { padding: 18px 15px; }
 .details-actions { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
 .details-desc-label { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
 .details-desc { font-size: 14px; line-height: 1.7; color: var(--text-dim); margin-bottom: 18px; }
 .player-wrap { padding: 0 15px 15px; display: none; }
 .player-wrap.active { display: block; }
 .player-container { position: relative; width: 100%; padding-top: 56.25%; background: #000; border-radius: 8px; overflow: hidden; }
 .player-container iframe,.player-container video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
 .now-playing-label { font-size: 13px; color: var(--text-faint); margin: 8px 0 0; }
 .player-poster { position: absolute; inset: 0; width: 100%; height: 100%; background-size: cover; background-position: center; background-color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
 .player-poster::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
 .player-play-btn { position: relative; z-index: 2; width: 72px; height: 72px; border-radius: 50%; background: #ff2d95; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 10px rgba(255,45,149,0.22), 0 8px 26px rgba(255,45,149,0.55); cursor: pointer; transition: transform 0.15s ease; animation: playPulse 2s ease-in-out infinite; }
 .player-play-btn:active { transform: scale(0.9); }
 .player-play-btn i { color: #fff; font-size: 26px; margin-left: 4px; }
  @keyframes playPulse { 0%, 100% { box-shadow: 0 0 0 10px rgba(255,45,149,0.22), 0 8px 26px rgba(255,45,149,0.55); } 50% { box-shadow: 0 0 0 16px rgba(255,45,149,0.12), 0 8px 26px rgba(255,45,149,0.55); } }
 .trailer-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
 .trailer-modal.active { display: flex; }
 .trailer-modal-inner { width: 100%; max-width: 900px; position: relative; }
 .trailer-modal-inner.player-container { padding-top: 56.25%; }
 .trailer-close { position: absolute; top: -40px; right: 0; font-size: 28px; color: #fff; cursor: pointer; background: rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
 .details-skeleton { text-align: center; padding: 60px 20px; color: var(--text-faint); }
  @media (min-width: 700px) {.details-poster { width: 150px; height: 220px; } }
  </style>
</head>
<body>

  <header id="mainHeader">
    <div class="header-left">
      <i class="fa fa-arrow-left back-btn" id="backBtn"></i>
      <div class="logo"><a href="index.html">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠🍩𝗩𝗜𝗘 𝗟🌲𝗡𝗗</span></a></div>
    </div>
    <div class="header-right">
      <button class="menu-toggle" id="menuBtn" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <div id="detailsRoot">
    <div class="details-skeleton"><i class="fa fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <div class="trailer-modal" id="trailerModal">
    <div class="trailer-modal-inner">
      <span class="trailer-close" id="trailerClose">&times;</span>
      <div class="player-container" id="trailerPlayerBox"></div>
    </div>
  </div>

  <br><br>
  <footer class="footer">
    <div class="footer-logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠𝗢𝗩𝗜𝗘 𝗟𝗔𝗡𝗗</span></div>
    <p class="footer-text">The best platform to stream latest Movies and Cartoons with high-quality subtitles. Enjoy your favorite content for free on Magical Movie Land.</p>
  </footer>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M", authDomain: "magical-movie-land.firebaseapp.com", projectId: "magical-movie-land", storageBucket: "magical-movie-land.firebasestorage.app", messagingSenderId: "27757424288", appId: "1:27757424288:web:d650e2659f09f0b9c823c5" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function ytIdFromUrl(url) {
    if (!url) return null;
    if (!url.includes('http')) return url;
    const patterns = [/youtu\.be\/([^?&]+)/, /v=([^?&]+)/, /embed\/([^?&]+)/];
    for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
    return null;
  }

  function isDirectFileUrl(url) {
    if (!url) return false;
    if (url.includes('youtube.com') || url.includes('youtu.be')) return false;
    return /\.(mp4|mkv|webm|mov|m4v|m3u8)(\?|$)/i.test(url) || url.includes('r2.dev') || url.includes('r2.cloudflarestorage.com');
  }

  // CHANGE 1: MKV + MP4 + M3U8 okkoma handle
  function buildPlayerHTML(url) {
    if (!url) return '<div class="details-skeleton">Video link නෑ</div>';
    const ytId = (url.includes('youtube.com') || url.includes('youtu.be'))? ytIdFromUrl(url) : null;
    if (ytId) return `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`;

    if (isDirectFileUrl(url)) {
      const isMKV = url.includes('.mkv');
      const videoType = isMKV? 'video/x-matroska' : 'video/mp4';
      return `<video id="mainPlayer" controls playsinline preload="auto" data-src="${url}"><source src="${url}" type="${videoType}"></video>`;
    }
    return `<iframe src="${url}" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`;
  }

  // CHANGE 2: Fallback logic + MKV error message for Safari
  function attachVideoFallback(playerBox) {
    const videoEl = playerBox.querySelector('video#mainPlayer');
    if (!videoEl) return;
    const src = videoEl.dataset.src;

    videoEl.muted = false;
    videoEl.play().catch((err) => {
      if (err && err.name === 'NotAllowedError') {
        videoEl.muted = true; videoEl.play().catch(() => {});
        videoEl.addEventListener('playing', () => { videoEl.muted = false; }, { once: true });
      }
    });

    videoEl.addEventListener('error', () => {
      if (Hls.isSupported() && src.includes('.m3u8')) {
        const hls = new Hls(); hls.loadSource(src); hls.attachMedia(videoEl);
      } else if (src.includes('.mkv')) {
        playerBox.innerHTML = `
          <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#fff; text-align:center; padding:20px; background:#000;">
            <i class="fa fa-exclamation-triangle" style="font-size:32px; margin-bottom:10px; color:#ff2d95;"></i>
            <b>Browser eka MKV play karanne na</b>
            <p style="font-size:12px; margin-top:8px;">Chrome/Android/PC walin try karanna. iPhone/Safari walin wada na</p>
            <a href="${src}" target="_blank" class="btn btn-primary" style="margin-top:12px;"><i class="fa fa-download"></i> Download to Watch</a>
          </div>`;
      } else {
        playerBox.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; height:100%; color:#fff; background:#000;"><b>Error : Refresh Page or Check Your Network.</b></div>`;
      }
    }, { once: true });
  }

  async function initWatch(id) {
    const root = document.getElementById('detailsRoot');
    if (!id) { root.innerHTML = `<div class="details-skeleton">Movie එක හමු නොවීය.</div>`; return; }
    try {
      const snap = await getDoc(doc(db, "movies", id));
      if (!snap.exists()) { root.innerHTML = `<div class="details-skeleton">Movie එක හමු නොවීය.</div>`; return; }
      const m = snap.data();
      document.title = (m.title || 'Watch') + ' - MAGICAL MOVIE LAND';
      const backdrop = m.backdrop || m.poster || '';
      const poster = m.poster || 'https://via.placeholder.com/150x220/222/fff';

      root.innerHTML = `
        <div class="details-hero" style="background-image:url('${backdrop}');">
          <div class="details-hero-inner">
            <img class="details-poster" src="${poster}" alt="${m.title}">
            <div class="details-title-block"><div class="details-title">${m.title || 'Untitled'}</div></div>
          </div>
        </div>
        <div class="details-body">
          <div class="details-actions">
            <button class="btn btn-primary" id="watchNowBtn"><i class="fa fa-play"></i> Watch Now</button>
          </div>
        </div>
        <div class="player-wrap" id="playerWrap"><div class="player-container" id="playerBox"></div><div class="now-playing-label" id="nowPlayingLabel"></div></div>
        <div class="details-body"><div class="details-desc-label">Overview</div><p class="details-desc">${m.description || 'Description එකක් නෑ.'}</p></div>
      `;

      const playerWrap = document.getElementById('playerWrap');
      const playerBox = document.getElementById('playerBox');
      const nowPlayingLabel = document.getElementById('nowPlayingLabel');
      const watchNowBtn = document.getElementById('watchNowBtn');

      watchNowBtn.addEventListener('click', () => {
        playerWrap.classList.add('active');
        nowPlayingLabel.textContent = m.title;
        playerBox.innerHTML = `<div class="player-poster" style="background-image:url('${backdrop}')"><div class="player-play-btn"><i class="fa fa-play"></i></div></div>`;
        playerBox.querySelector('.player-poster').addEventListener('click', () => {
          playerBox.innerHTML = buildPlayerHTML(m.videoUrl);
          attachVideoFallback(playerBox);
        }, { once: true });
        playerWrap.scrollIntoView({ behavior: 'smooth' });
      });

    } catch (err) { console.error(err); root.innerHTML = `<div class="details-skeleton">⚠️ දෝෂයක් සිදු විය.</div>`; }
  }

  const params = new URLSearchParams(window.location.search);
  initWatch(params.get('id'));
  </script>
</body>
</html>
