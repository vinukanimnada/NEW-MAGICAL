<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Watch - MAGICAL MOVIE LAND</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{background:#000;color:white;font-family:Arial;margin:0;padding:0}

/* Player - edge to edge කළු */
.player{width:100%;height:55vh;background:#000;position:relative;overflow:hidden;margin-bottom:0}
iframe{width:100%;height:100%;border:none;position:absolute;top:0;left:0;display:none}

/* Play button overlay */
.play-overlay{
    position:absolute;
    top:0;left:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2;
}

.play-btn{
    font-size:70px;
    color:#fff;
    background:rgba(0,0,0,0.6);
    width:90px;
    height:90px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.2s;
}
.play-btn:hover{transform:scale(1.1);background:rgba(255,45,149,0.8)}
.play-btn:active{transform:scale(0.95)}

.playing iframe{display:block}
.playing .play-overlay{display:none}

/* Alert card */
.alert{background:#1a1a1a;color:#ccc;padding:15px;margin:15px;border-radius:10px;font-size:14px;text-align:center;line-height:1.6}
.alert span{color:#ff4444;font-weight:bold}

.info{padding:0 15px 20px;max-width:1000px;margin:auto}

/* Poster වම්, Details දකුණ - PC + Mobile දෙකටම */
.movie-detail{
    display:flex;
    gap:25px;
    margin-top:20px;
    align-items:flex-start;
    background:#1a1a1a;
    padding:20px;
    border-radius:12px;
}

/* Poster එක - වම් පැත්තට fix width */
.movie-detail img{
    width:200px;
    flex-shrink:0;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(255,45,149,0.3);
}

/* Details ටික - දකුණු පැත්තට */
.movie-detail > div{
    flex:1;
    min-width:0;
}

.movie-detail h1{
    margin:0 0 12px 0;
    font-size:26px;
    color:#fff;
    line-height:1.3;
    text-align:left;
}

.movie-detail p{
    margin:8px 0;
    font-size:15px;
    color:#ccc;
    text-align:left;
    display:flex;
    align-items:center;
}

.movie-detail p strong{
    color:#fff;
    font-weight:600;
    margin-right:8px;
    min-width:130px;
    display:flex;
    align-items:center;
    gap:6px;
}

.imdb-box{color:#f5c518;font-weight:bold;font-size:15px}
.imdb-box small{color:#aaa;font-size:13px}

/* Quality Badge */
.badges{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;justify-content:flex-start}
.badge{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:bold}
.badge.fhd{background:#ff1493;color:white}
.badge.hd{background:#ff4500;color:white}
.badge.web-dl{background:#00bfff;color:white}
.badge.cam{background:#888;color:white}
.badge.imdb{background:#f5c518;color:#000}

/* Mobile responsive - පොඩි කරලා side-by-side ම */
@media (max-width: 768px){
    .player{height:45vh}
    .play-btn{font-size:60px;width:75px;height:75px}
    
    .movie-detail{
        gap:15px;
        padding:15px;
    }
    .movie-detail img{
        width:130px; /* Mobile එකේ පොඩි කරා */
        border-radius:10px;
    }
    .movie-detail h1{
        font-size:18px;
        line-height:1.4;
    }
    .movie-detail p{
        font-size:13px;
        margin:6px 0;
    }
    .movie-detail p strong{
        min-width:100px;
        font-size:13px;
    }
    .badge{
        font-size:11px;
        padding:3px 8px;
    }
</style>
</head>
<body>
  
  <!-- Header -->
  <header>
    <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠𝗢𝗩𝗜𝗘 𝗟𝗔𝗡𝗗</span></div>
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
      <i class="fa fa-bars" id="menuBtn"></i>
    </div>
  </header>

  <!-- Search Bar -->
  <div class="search-box" id="searchBox">
    <input type="text" placeholder="Search cartoons or movies...">
    <i class="fa fa-times" id="closeSearch"></i>
  </div>

  <!-- Sidebar Menu -->
  <div class="sidebar" id="sidebar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="movies.html">All Movies</a></li>
      <li><a href="tvshows.html">TV Shows</a></li>
      <li><a href="chanels.html">Join Chanels</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </div>
  <span class="close-btn" id="closeSidebar">×</span>
  <div class="overlay" id="overlay"></div>
  
<!-- Player - Play button + Video -->
<div class="player" id="playerBox">
  <div class="play-overlay" id="playOverlay">
    <button class="play-btn" id="playBtn">▶</button>
  </div>
  <iframe id="videoFrame" src="" allowfullscreen allow="autoplay" referrerpolicy="no-referrer"></iframe>
</div>

<div class="alert">
  <span>Click</span> කිරීමේදී, ඔබ අදාල එකක් සඳහා <span>redirect</span> වූවොත්, නැවත අපගේ වෙබ් අඩවියට <span>Back</span> වන්න.
</div>

<div class="info">
  <div class="movie-detail">
    <img id="poster" src="" alt="">
    <div>
      <h1 id="movieTitle"></h1>
      
      <!-- Quality + IMDb Badges -->
      <div class="badges" id="badges"></div>
      
      <!-- Details ටික - දකුණු පැත්තට -->
      <p><strong>🎭 Genres:</strong> <span id="genres"></span></p>
      <p><strong>👨‍💼 Director:</strong> <span id="director"></span></p>
      <p><strong>⏱️ Duration:</strong> <span id="duration"></span></p>
      <p><strong>🗣️ Language:</strong> <span id="language"></span></p>
      <p><strong>🌍 Country:</strong> <span id="country"></span></p>
      <p><strong>📅 Release Year:</strong> <span id="year"></span></p>
      <p><strong>⭐ IMDb Rating:</strong> <span class="imdb-box">⭐ <span id="imdb"></span> <small id="imdbVotes"></small></span></p>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
  authDomain: "magical-movie-land.firebaseapp.com",
  projectId: "magical-movie-land",
  storageBucket: "magical-movie-land.firebasestorage.app",
  messagingSenderId: "27757424288",
  appId: "1:27757424288:web:d650e2659f09f0b9c823c5",
  measurementId: "G-KK84DYV9EP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const movieId = params.get('id');

async function loadMovie() {
  if(!movieId) {
    document.getElementById('movieTitle').innerText = 'Movie හම්බුනේ නෑ';
    return;
  }
  
  const docRef = doc(db, "movies", movieId);
  const docSnap = await getDoc(docRef);
  
  if(docSnap.exists()) {
    const m = docSnap.data();
    document.getElementById('pageTitle').innerText = (m.title || 'Movie') + ' - MAGICAL MOVIE LAND';
    document.getElementById('movieTitle').innerText = m.title || 'Untitled';
    
    // Quality Badge + IMDb Badge
    const quality = m.quality || 'HD';
    const qualityClass = quality.toLowerCase().replace('.', '-');
    let badgesHTML = `<span class="badge ${qualityClass}">${quality}</span>`;
    if(m.imdbRating) badgesHTML += `<span class="badge imdb">⭐ ${m.imdbRating}</span>`;
    document.getElementById('badges').innerHTML = badgesHTML;
    
    // Firebase data load
    document.getElementById('genres').innerText = m.genres || 'N/A';
    document.getElementById('director').innerText = m.director || 'N/A';
    document.getElementById('duration').innerText = m.duration || 'N/A';
    document.getElementById('language').innerText = m.language || 'N/A';
    document.getElementById('country').innerText = m.country || 'N/A';
    document.getElementById('year').innerText = m.year || '2024';
    
    document.getElementById('imdb').innerText = m.imdbRating || 'N/A';
    document.getElementById('imdbVotes').innerText = m.imdbVotes ? '(' + m.imdbVotes + ' votes)' : '';
    
    document.getElementById('category').innerText = m.category || 'Movie';
    document.getElementById('poster').src = m.poster || 'https://via.placeholder.com/200x300/222/fff?text=No+Image';
    
    // Video Player + Play button
    const playerBox = document.getElementById('playerBox');
    const playOverlay = document.getElementById('playOverlay');
    const playBtn = document.getElementById('playBtn');
    const videoFrame = document.getElementById('videoFrame');

    if(m.video && m.video.trim() !== '' && m.video !== '#') {
        playOverlay.style.display = 'flex';
        playBtn.onclick = function() {
            videoFrame.src = m.video;
            videoFrame.style.display = 'block';
            playerBox.classList.add('playing');
        };
    } else {
        playOverlay.innerHTML = `
            <div style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; color:#666; text-align:center;">
                <div style="font-size:60px; margin-bottom:20px;">🎬</div>
                <div style="font-size:20px; font-weight:bold; color:#ff2d95; margin-bottom:10px;">Video එක තාම Ready නෑ</div>
                <div style="font-size:14px; color:#888; line-height:1.6;">
                    Admin එකෙන් Doodstream link එක add කරපු ගමන්<br>
                    මේක auto play වෙයි ✅
                </div>
            </div>
        `;
    }
  } else {
    document.getElementById('movieTitle').innerText = 'Movie හොයාගන්න බැරි උනා';
    document.getElementById('playerBox').innerHTML = '<div style="text-align:center; padding:100px; color:#ff4444;">Movie එක හොයාගන්න බැරි වුනා</div>';
  }
}

loadMovie();
</script>
</body>
</html>
