<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Watch - MAGICAL MOVIE LAND</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{background:#000;color:white;font-family:Arial;margin:0;padding:0}

/* Player - edge to edge කළු */
.player{width:100%;height:55vh;background:#000;position:relative;overflow:hidden;margin-bottom:0}
.player video{width:100%;height:100%;object-fit:contain;background:#000;display:block}

.info{padding:0 15px 20px;max-width:1000px;margin:auto}

/* Poster + Details wrapper - flex row */
.movie-detail{
    display:flex;
    gap:20px;
    margin-top:20px;
    align-items:flex-start;
    background:#1a1a1a;
    padding:20px;
    border-radius:12px;
}

/* Left side - Poster + Title column */
.left-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    flex-shrink:0;
}

.left-col img{
    width:200px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(255,45,149,0.3);
    margin-bottom:12px;
}

/* Title එක - Poster යට මැදට */
.left-col h1{
    margin:0;
    font-size:22px;
    color:#fff;
    text-align:center;
    font-weight:600;
    line-height:1.3;
    max-width:200px;
    word-wrap:break-word;
}

/* Right side - Details ටික උඩට */
.right-col{
    flex:1;
    min-width:0;
}

/* Badges උඩින්ම */
.badges{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap;justify-content:flex-start}
.badge{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:bold}
.badge.fhd{background:#ff1493;color:white}
.badge.hd{background:#ff4500;color:white}
.badge.web-dl{background:#00bfff;color:white}
.badge.cam{background:#888;color:white}
.badge.imdb{background:#f5c518;color:#000}

/* Details ටික - right side උඩින් */
.details-list p{
    margin:8px 0;
    font-size:15px;
    color:#ccc;
    text-align:left;
    display:flex;
    align-items:center;
}

.details-list p strong{
    color:#fff;
    font-weight:600;
    margin-right:8px;
    min-width:130px;
    display:flex;
    align-items:center;
    gap:6px;
}

.imdb-box{color:#f5c518;font-weight:bold;font-size:15px}
.imdb-box small{color:#aaa;font-size:13px}

/* Mobile responsive */
@media (max-width: 768px){
    .player{height:45vh}
    .movie-detail{gap:15px;padding:15px}
    .left-col img{width:130px;border-radius:10px}
    .left-col h1{font-size:16px;max-width:130px}
    .details-list p{font-size:13px;margin:6px 0}
    .details-list p strong{min-width:100px;font-size:13px}
    .badge{font-size:11px;padding:3px 8px}
}
</style>
</head>
<body>
  
  <header>
    <div class="logo">𝗠𝗔𝗚𝗜𝗖𝗔𝗟 <span>𝗠𝗢𝗩𝗜𝗘 𝗟𝗔𝗡𝗗</span></div>
    <div class="header-right">
      <i class="fa fa-search" id="searchBtn"></i>
      <i class="fa fa-bars" id="menuBtn"></i>
    </div>
  </header>

  <div class="search-box" id="searchBox">
    <input type="text" placeholder="Search cartoons or movies...">
    <i class="fa fa-times" id="closeSearch"></i>
  </div>

  <div class="sidebar" id="sidebar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="movies.html">All Movies</a></li>
      <li><a href="tvshows.html">TV Shows</a></li>
      <li><a href="chanels.html">Join Chanels</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </div>
  <span class="close-btn" id="closeSidebar">×</span>
  <div class="overlay" id="overlay"></div>
  
<!-- Video Player - HTML5 video tag -->
<div class="player" id="playerBox">
  <video 
    id="videoPlayer" 
    controls 
    preload="metadata"
    poster="" 
    style="width:100%; height:100%; background:#000; display:block;">
    <source id="videoSource" src="" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<div class="info">
  <div class="movie-detail">
    <!-- වම් පැත්ත: Poster + Title යට -->
    <div class="left-col">
      <img id="poster" src="" alt="">
      <h1 id="movieTitle"></h1>
    </div>
    
    <!-- දකුණු පැත්ත: Details ටික උඩින්ම -->
    <div class="right-col">
      <!-- Quality + IMDb Badges -->
      <div class="badges" id="badges"></div>
      
      <!-- Details ටික -->
      <div class="details-list">
        <p><strong>🎭 Genres:</strong> <span id="genres"></span></p>
        <p><strong>👨‍💼 Director:</strong> <span id="director"></span></p>
        <p><strong>⏱️ Duration:</strong> <span id="duration"></span></p>
        <p><strong>🗣️ Language:</strong> <span id="language"></span></p>
        <p><strong>🌍 Country:</strong> <span id="country"></span></p>
        <p><strong>📅 Release Year:</strong> <span id="year"></span></p>
        <p><strong>⭐ IMDb Rating:</strong> <span class="imdb-box">⭐ <span id="imdb"></span> <small id="imdbVotes"></small></span></p>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCx0TEmgr3GCyvfeok9Y42yR1PTM4_8y9M",
  authDomain: "magical-movie-land.firebaseapp.com",
  projectId: "magical-movie-land",
  storageBucket: "magical-movie-land.firebasestorage.app",
  messagingSenderId: "27757424288",
  appId: "1:27757424288:web:d650e2659f09f0b9c823c5",
  measurementId: "G-KK84DYV9EP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const movieId = params.get('id');

async function loadMovie() {
  if(!movieId) {
    document.getElementById('movieTitle').innerText = 'Movie හම්බුනේ නෑ';
    return;
  }
  
  const docRef = doc(db, "movies", movieId);
  const docSnap = await getDoc(docRef);
  
  if(docSnap.exists()) {
    const m = docSnap.data();
    document.getElementById('pageTitle').innerText = (m.title || 'Movie') + ' - MAGICAL MOVIE LAND';
    document.getElementById('movieTitle').innerText = m.title || 'Untitled';
    
    // Quality Badge + IMDb Badge
    const quality = m.quality || 'HD';
    const qualityClass = quality.toLowerCase().replace('.', '-');
    let badgesHTML = `<span class="badge ${qualityClass}">${quality}</span>`;
    if(m.imdbRating) badgesHTML += `<span class="badge imdb">⭐ ${m.imdbRating}</span>`;
    document.getElementById('badges').innerHTML = badgesHTML;
    
    // Firebase data load
    document.getElementById('genres').innerText = m.genres || 'N/A';
    document.getElementById('director').innerText = m.director || 'N/A';
    document.getElementById('duration').innerText = m.duration || 'N/A';
    document.getElementById('language').innerText = m.language || 'N/A';
    document.getElementById('country').innerText = m.country || 'N/A';
    document.getElementById('year').innerText = m.year || '2024';
    document.getElementById('imdb').innerText = m.imdbRating || 'N/A';
    document.getElementById('imdbVotes').innerText = m.imdbVotes ? '(' + m.imdbVotes + ' votes)' : '';
    document.getElementById('poster').src = m.poster || 'https://via.placeholder.com/200x300/222/fff?text=No+Image';
    
    // Video Player - HTML5 video tag
    const videoPlayer = document.getElementById('videoPlayer');
    const videoSource = document.getElementById('videoSource');
    
    // Poster එක player background එකට
    if(m.poster) {
        videoPlayer.poster = m.poster;
    }
    
    // URL එක තියෙනවා නම් source එකට දානවා
    if(m.video && m.video.trim() !== '' && m.video !== '#') {
        videoSource.src = m.video;
    } else {
        // URL නැත්තම් src එක blank - එතකොට 0:00 පෙන්නවා
        videoSource.src = '';
    }
    
    // Video tag එක reload කරන්න ඕන source change කරාට පස්සේ
    videoPlayer.load();
    
  } else {
    document.getElementById('movieTitle').innerText = 'Movie හොයාගන්න බැරි උනා';
    document.getElementById('playerBox').innerHTML = '<div style="text-align:center; padding:100px; color:#ff4444;">Movie එක හොයාගන්න බැරි වුනා</div>';
  }
}

loadMovie();

// Sidebar + Search toggle
document.getElementById('menuBtn').onclick = () => {
  document.getElementById('sidebar').classList.add('active');
  document.getElementById('overlay').classList.add('active');
}
document.getElementById('closeSidebar').onclick = () => {
  document.getElementById('sidebar').classList.remove('active');
  document.getElementById('overlay').classList.remove('active');
}
document.getElementById('overlay').onclick = () => {
  document.getElementById('sidebar').classList.remove('active');
  document.getElementById('overlay').classList.remove('active');
}
document.getElementById('searchBtn').onclick = () => {
  document.getElementById('searchBox').classList.toggle('active');
}
document.getElementById('closeSearch').onclick = () => {
  document.getElementById('searchBox').classList.remove('active');
}
</script>
</body>
</html>
